<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI彩票预测专家 Pro Max | Cyberpunk Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --cyan: #00F5FF;
            --purple: #6E00FF;
            --green: #00FF9D;
            --red: #FF4D6D;
            --bg: #0B1020;
            --panel: rgba(10, 18, 40, 0.85);
            --border: rgba(0, 245, 255, 0.3);
            --glow: 0 0 20px rgba(0, 245, 255, 0.4);
            --text: #c8d6e5;
            --gold: #FFD700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 245, 255, 0.015) 2px, rgba(0, 245, 255, 0.015) 4px);
        }
        #app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(8, 14, 30, 0.9);
            border-bottom: 2px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            gap: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .navbar .logo {
            font-size: 1.3em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .navbar .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .navbar .nav-tab {
            padding: 7px 13px;
            border: 1px solid rgba(0, 245, 255, 0.35);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.78em;
            transition: all 0.3s;
            background: transparent;
            color: var(--text);
            white-space: nowrap;
            letter-spacing: 1px;
        }
        .navbar .nav-tab:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.35);
            color: #fff;
            background: rgba(0, 245, 255, 0.08);
        }
        .navbar .nav-tab.active {
            background: rgba(0, 245, 255, 0.15);
            border-color: var(--cyan);
            color: #fff;
            box-shadow: var(--glow);
            font-weight: bold;
        }
        .navbar .lottery-switch {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 3px;
            border: 1px solid var(--border);
        }
        .navbar .lottery-switch button {
            padding: 7px 16px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
            transition: all 0.3s;
            background: transparent;
            color: var(--text);
            letter-spacing: 1px;
        }
        .navbar .lottery-switch button.active {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
        }
        .main-content {
            flex: 1;
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.6;
        }
        .panel-title {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }
        .panel-title::before {
            content: '◆';
            font-size: 0.6em;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .ball-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .ball {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2em;
            color: #fff;
            position: relative;
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.5), inset 0 -4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        .ball.front {
            background: radial-gradient(circle at 35% 30%, #ff6b8a, #c0392b 90%);
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.6);
        }
        .ball.back {
            background: radial-gradient(circle at 35% 30%, #5dade2, #1a5276 90%);
            box-shadow: 0 0 25px rgba(0, 180, 255, 0.6);
        }
        .ball.rolling {
            animation: ballRoll 0.08s infinite;
        }
        @keyframes ballRoll {
            0% {
                transform: translateY(-3px);
            }
            50% {
                transform: translateY(3px);
            }
            100% {
                transform: translateY(-3px);
            }
        }
        .ball.stopped {
            animation: ballStop 0.5s ease-out;
        }
        @keyframes ballStop {
            0% {
                transform: scale(1.3);
                box-shadow: 0 0 50px rgba(255, 215, 0, 1);
            }
            60% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }
        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 0.85em;
            white-space: nowrap;
        }
        .btn:hover {
            box-shadow: var(--glow);
            border-color: var(--cyan);
            color: #fff;
            transform: translateY(-2px);
        }
        .btn.primary {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(110, 0, 255, 0.2));
            border-color: var(--cyan);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.25);
        }
        .btn.primary:hover {
            box-shadow: 0 0 35px rgba(0, 245, 255, 0.5);
        }
        .btn.danger {
            border-color: var(--red);
            color: var(--red);
        }
        .btn.danger:hover {
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.5);
        }
        .btn.small {
            padding: 5px 12px;
            font-size: 0.7em;
            border-radius: 15px;
        }
        .btn.vip {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
        }
        .btn.vip:hover {
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }
        .rating-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1em;
            letter-spacing: 2px;
            border: 2px solid;
        }
        .rating-sss {
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            animation: glowGold 1.5s infinite;
        }
        @keyframes glowGold {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 45px rgba(255, 215, 0, 1);
            }
        }
        .rating-ss {
            border-color: #ff6b9d;
            color: #ff6b9d;
        }
        .rating-s {
            border-color: #ff9f43;
            color: #ff9f43;
        }
        .rating-a {
            border-color: #54a0ff;
            color: #54a0ff;
        }
        .rating-b {
            border-color: #5f27cd;
            color: #5f27cd;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(5, 8, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .overlay .login-title {
            font-size: 2.8em;
            font-weight: 900;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFD700, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShine 3s infinite;
        }
        @keyframes titleShine {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.5);
            }
        }
        .overlay .login-subtitle {
            color: var(--cyan);
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        .overlay .login-box {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }
        .overlay input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-family: inherit;
            font-size: 0.9em;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
        }
        .overlay input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8000;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 12px 20px;
            border-radius: 25px;
            background: var(--panel);
            border: 1px solid var(--green);
            color: var(--green);
            letter-spacing: 1px;
            font-weight: bold;
            animation: toastIn 0.4s ease-out;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--cyan);
            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .music-btn:hover {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
        }
        .predict-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .predict-left {
            min-width: 80px;
            text-align: center;
        }
        .predict-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ball-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .vip-lock {
            color: var(--gold);
            font-size: 0.8em;
            margin-left: 4px;
        }
        @media (max-width: 768px) {
            .navbar .nav-tab {
                padding: 5px 9px;
                font-size: 0.65em;
            }
            .navbar .logo {
                font-size: 1em;
            }
            .ball {
                width: 38px;
                height: 38px;
                font-size: 0.9em;
            }
            .overlay .login-title {
                font-size: 1.8em;
            }
            .panel {
                padding: 12px;
            }
        }
        .hidden {
            display: none !important;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }
        .chart-box {
            width: 100%;
            height: 350px;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="scanline"></div>

    <!-- ========== 登录页面 ========== -->
    <div id="loginOverlay" class="overlay">
        <div class="login-title">彩 票 预 测 模 拟</div>
        <div class="login-subtitle">▸ AI PREDICTION SYSTEM ◂</div>
        <div class="login-box">
            <input type="email" id="loginEmail" placeholder="请输入邮箱地址" autocomplete="email">
            <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">

                还没有账号？<a href="#" onclick="showRegister()" style="color:var(--cyan); font-weight:bold; text-decoration:none;">立即注册 →</a>
            </p>
            <p style="text-align:center; margin-top:8px; font-size:0.65em; color:#888;">
                注册后请查看邮箱验证（Supabase Auth）
            </p>
        </div>
    </div>

    <!-- ========== 注册页面（独立） ========== -->
    <div id="registerOverlay" class="overlay hidden">
        <div class="login-title">彩 票 预 测 模 拟</div>
        <div class="login-subtitle">▸ 创建新账号 ◂</div>
        <div class="login-box">
            <input type="email" id="regEmail" placeholder="请输入邮箱地址" autocomplete="email">
            <input type="password" id="regPass" placeholder="请设置密码（至少6位）" autocomplete="new-password">
            <input type="password" id="regPassConfirm" placeholder="请再次输入密码" autocomplete="new-password">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn primary" onclick="handleRegister()" style="flex:1;">📝 注 册</button>
            </div>
            <p style="text-align:center; margin-top:15px; font-size:0.85em; color:var(--text);">
                已有账号？<a href="#" onclick="showLogin()" style="color:var(--cyan); font-weight:bold; text-decoration:none;">去登录 →</a>
            </p>
        </div>
    </div>

    <!-- ========== 主应用 ========== -->
    <div id="app" class="hidden">
        <nav class="navbar">
            <span class="logo">⚡ AI预测 Pro Max</span>
            <div class="lottery-switch">
                <button id="btnDLT" class="active" onclick="switchLottery('dlt')">大乐透</button>
                <button id="btnSSQ" onclick="switchLottery('ssq')">双色球</button>
            </div>
            <div class="nav-tabs" id="navTabs">
                <span class="nav-tab active" data-tab="predict">🎯 AI预测</span>
                <span class="nav-tab" data-tab="analysis">📊 分析 <span class="vip-lock">🔒</span></span>
                <span class="nav-tab" data-tab="lab">🧪 实验室 <span class="vip-lock">🔒</span></span>
                <span class="nav-tab" data-tab="charts">📈 图表 <span class="vip-lock">🔒</span></span>
                <span class="nav-tab" data-tab="simulator">🎰 摇奖</span>
                <span class="nav-tab" data-tab="results">📡 开奖</span>
                <span class="nav-tab" data-tab="favorites">⭐ 收藏 <span class="vip-lock">🔒</span></span>
                <span class="nav-tab" data-tab="history">📋 历史 <span class="vip-lock">🔒</span></span>
                <span class="nav-tab" data-tab="settings">⚙️ 设置</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px; margin-left:auto; flex-wrap:wrap;">
                <span id="vipBadge" style="color:var(--gold); font-weight:bold; display:none;">👑 VIP</span>
                <button class="btn small vip" onclick="showVIPModal()">升级VIP</button>
                <span style="color:var(--text); font-size:0.8em;" id="userDisplay"></span>
                <button class="btn small danger" onclick="logout()" style="display:none;" id="logoutBtn">退出</button>
            </div>
        </nav>
        <div class="main-content" id="mainContent"></div>
        <footer style="text-align:center;padding:16px;font-size:0.7em;opacity:0.5;letter-spacing:2px;z-index:10;">
            AI彩票预测专家 Pro Max · 仅用于数据分析与可视化 · 不保证预测准确性
        </footer>
    </div>

    <div id="toastContainer"></div>
    <div class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵</div>

    <script>
        // ========== 请替换为你的 Supabase 凭证 ==========
        const SUPABASE_URL = 'https://qwvrojfdripeswuocgpo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_5c2rAccL-qR_QX7iAiQXiw_IdCVF_a4';
        // =================================================

        let sb = null;
        try {
            if (SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_URL !== 'https://your-project.supabase.co') {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (e) {
            console.warn('Supabase 初始化失败，将使用本地模式。', e);
        }

        const STATE = {
            lottery: 'dlt',
            currentTab: 'predict',
            user: null,
            favorites: [],
            predictions: [],
            history: [],
            settings: {
                sound: true,
                music: true,
                weights: {
                    hot: 20,
                    cold: 10,
                    miss: 20,
                    consec: 10,
                    markov: 20,
                    monte: 15,
                    bayes: 5
                },
                strategy: 'balanced'
            },
            freePredictCount: 3,
            freeSimCount: 10,
            isRolling: false,
            customMusic: null,
        };

        function loadState() {
            try {
                const raw = localStorage.getItem('lottery_pro_max');
                if (raw) {
                    const d = JSON.parse(raw);
                    STATE.favorites = d.favorites || [];
                    STATE.predictions = d.predictions || [];
                    STATE.history = d.history || [];
                    STATE.settings = { ...STATE.settings, ...d.settings };
                    STATE.user = d.user || null;
                    STATE.freePredictCount = d.freePredictCount ?? 3;
                    STATE.freeSimCount = d.freeSimCount ?? 10;
                    STATE.customMusic = d.customMusic || null;
                }
            } catch (e) {}
        }

        function saveState() {
            localStorage.setItem('lottery_pro_max', JSON.stringify({
                favorites: STATE.favorites,
                predictions: STATE.predictions,
                history: STATE.history,
                settings: STATE.settings,
                user: STATE.user,
                freePredictCount: STATE.freePredictCount,
                freeSimCount: STATE.freeSimCount,
                customMusic: STATE.customMusic
            }));
        }
        loadState();

        // ==================== 粒子背景动画 ====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [],
            mouse = { x: -999, y: -999 };

        function resizeCanvas() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas();
            initParticles(); });

        function initParticles() {
            particles = [];
            const n = Math.min(120, Math.floor((canvas.width * canvas.height) / 8000));
            for (let i = 0; i < n; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    r: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.7 + 0.3,
                    color: ['#00F5FF', '#6E00FF', '#00FF9D', '#FF4D6D'][Math.floor(Math.random() * 4)]
                });
            }
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < -20) p.x = canvas.width + 20;
                if (p.x > canvas.width + 20) p.x = -20;
                if (p.y < -20) p.y = canvas.height + 20;
                if (p.y > canvas.height + 20) p.y = -20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();
                const dx = mouse.x - p.x,
                    dy = mouse.y - p.y,
                    dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    ctx.strokeStyle = p.color;
                    ctx.globalAlpha = (1 - dist / 180) * 0.5;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

        function playTickSound() {
            if (!STATE.settings.sound) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 800 + Math.random() * 400;
                gain.gain.value = 0.05;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        function playWinSound() {
            if (!STATE.settings.sound) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 1200;
                gain.gain.value = 0.08;
                osc.type = 'triangle';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (e) {}
        }

        function getCfg() {
            return STATE.lottery === 'dlt' ? { name: '大乐透', fName: '前区', bName: '后区', fMax: 35, fCnt: 5, bMax: 12,
                bCnt: 2 } : { name: '双色球', fName: '红球', bName: '蓝球', fMax: 33, fCnt: 6, bMax: 16, bCnt: 1 };
        }

        function rInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

        function genRandom(cfg) {
            const f = new Set();
            while (f.size < cfg.fCnt) f.add(rInt(1, cfg.fMax));
            const b = new Set();
            while (b.size < cfg.bCnt) b.add(rInt(1, cfg.bMax));
            return { fronts: [...f].sort((a, b) => a - b), backs: [...b].sort((a, b) => a - b) };
        }

        function aiPredict() {
            const cfg = getCfg();
            const nums = genRandom(cfg);
            const strategy = STATE.settings.strategy;
            let base = 70;
            if (strategy === 'conservative') base = 65;
            else if (strategy === 'aggressive') base = 75;
            else if (strategy === 'extreme') base = 80;
            const score = Math.min(99.9, base + Math.random() * 25);
            const confidence = Math.min(99.9, score - 2 + Math.random() * 8);
            let rating = 'B';
            if (score >= 97) rating = 'SSS';
            else if (score >= 93) rating = 'SS';
            else if (score >= 88) rating = 'S';
            else if (score >= 80) rating = 'A';
            return { numbers: nums, score: parseFloat(score.toFixed(1)), confidence: parseFloat(confidence.toFixed(1)),
                rating, timestamp: new Date().toISOString(), lottery: STATE.lottery };
        }

        // ==================== 号码球滚动动画 ====================
        function rollNumbersSequentially(containerId, fronts, backs, cfg, callback) {
            const container = document.getElementById(containerId);
            if (!container) return;
            STATE.isRolling = true;
            container.innerHTML = '';
            const all = [];
            fronts.forEach((n, i) => all.push({ num: n, type: 'front', delay: i * 600 }));
            backs.forEach((n, i) => all.push({ num: n, type: 'back', delay: (fronts.length + i) * 600 }));
            all.forEach(item => {
                const ball = document.createElement('span');
                ball.className = 'ball rolling ' + item.type;
                ball.textContent = '?';
                ball.style.opacity = '0.3';
                container.appendChild(ball);
                setTimeout(() => {
                    ball.style.opacity = '1';
                    ball.classList.add('rolling');
                    let cur = rInt(1, item.type === 'front' ? cfg.fMax : cfg.bMax),
                        cnt = 0;
                    const maxRolls = 15 + Math.floor(Math.random() * 10);
                    const interval = setInterval(() => {
                        cur = rInt(1, item.type === 'front' ? cfg.fMax : cfg.bMax);
                        ball.textContent = String(cur).padStart(2, '0');
                        cnt++;
                        playTickSound();
                        if (cnt >= maxRolls) {
                            clearInterval(interval);
                            ball.textContent = String(item.num).padStart(2, '0');
                            ball.classList.remove('rolling');
                            ball.classList.add('stopped');
                            playWinSound();
                            setTimeout(() => ball.classList.remove('stopped'), 500);
                        }
                    }, 60);
                }, item.delay);
            });
            setTimeout(() => { STATE.isRolling = false; if (callback) callback(); }, all.length * 600 + 400);
        }

        function runMonteCarlo(times) {
            const cfg = getCfg();
            const ff = {},
                bf = {};
            for (let i = 1; i <= cfg.fMax; i++) ff[i] = 0;
            for (let i = 1; i <= cfg.bMax; i++) bf[i] = 0;
            for (let i = 0; i < times; i++) { const n = genRandom(cfg);
                n.fronts.forEach(x => ff[x]++);
                n.backs.forEach(x => bf[x]++); }
            const fronts = Object.entries(ff).sort((a, b) => b[1] - a[1]).slice(0, cfg.fCnt).map(([n]) => +n).sort((a,
                b) => a - b);
            const backs = Object.entries(bf).sort((a, b) => b[1] - a[1]).slice(0, cfg.bCnt).map(([n]) => +n).sort((a, b) =>
                a - b);
            document.getElementById('monteResult').innerHTML = '';
            rollNumbersSequentially('monteResult', fronts, backs, cfg);
        }

        function runMarkov() {
            const cfg = getCfg();
            const buildMatrix = (max) => {
                const m = {};
                for (let i = 1; i <= max; i++) m[i] = {};
                for (let i = 1; i <= max; i++) { let t = 0; for (let j = 1; j <= max; j++) if (i !== j) { m[i][j] = Math
                            .random();
                        t += m[i][j]; } for (let j = 1; j <= max; j++) if (i !== j) m[i][j] /= t; }
                return m;
            };
            const fm = buildMatrix(cfg.fMax),
                bm = buildMatrix(cfg.bMax);
            const generate = (mx, max, cnt) => {
                const sel = new Set();
                let cur = rInt(1, max);
                sel.add(cur);
                while (sel.size < cnt) { let best = null,
                        p = 0; for (let j = 1; j <= max; j++) if (!sel.has(j)) { const prob = mx[cur]?.[j] || 0; if (
                            prob > p) { p = prob;
                            best = j; } } if (!best) do { best = rInt(1, max); } while (sel.has(best));
                    sel.add(best);
                    cur = best; }
                return [...sel].sort((a, b) => a - b);
            };
            const fronts = generate(fm, cfg.fMax, cfg.fCnt),
                backs = generate(bm, cfg.bMax, cfg.bCnt);
            document.getElementById('markovResult').innerHTML = '';
            rollNumbersSequentially('markovResult', fronts, backs, cfg);
        }

            document.getElementById('mainContent').innerHTML = `
                <div class="panel" style="text-align:center;">
                    <div class="panel-title">🎰 ${cfg.name}摇奖模拟 (剩余${left}次)</div>
                    <div class="ball-container" id="simBalls"></div>
                    <button class="btn primary" onclick="startSim()">🎲 开始摇奖</button>
                </div>`;
        }

        function startSim() {
            if (!isVIP() && STATE.freeSimCount <= 0) { showToast('免费摇奖次数已用完，请升级VIP', '#FFD700');
                showVIPModal(); return; }
            if (!isVIP()) STATE.freeSimCount--;
            saveState();
            const cfg = getCfg();
            const nums = genRandom(cfg);
            rollNumbersSequentially('simBalls', nums.fronts, nums.backs, cfg);
        }

        function renderResults() {
            document.getElementById('mainContent').innerHTML =
                '<div class="panel"><div class="panel-title">📡 实时开奖</div><p style="text-align:center;">模拟开奖数据（可接入真实API）</p></div>';
        }

        function renderFavorites() {
            const filtered = STATE.favorites.filter(f => f.lottery === STATE.lottery);
            document.getElementById('mainContent').innerHTML = `
                <div class="panel">
                    <div class="panel-title">⭐ 收藏中心 - ${getCfg().name} (${filtered.length}条)</div>
                    ${filtered.length === 0 ? '<p style="text-align:center;">暂无收藏</p>' : filtered.map(f => `<p style="text-align:center;">${f.numsStr.replace('|',' | ')} 评分:${f.score||'-'} 评级:${f.rating||'B'}</p>`).join('')}
                </div>`;
        }

        function renderHistory() {
            const recent = STATE.history.slice(0, 30);
            document.getElementById('mainContent').innerHTML = `
                <div class="panel">
                    <div class="panel-title">📋 预测历史 (最近${recent.length}条)</div>
                    ${recent.length === 0 ? '<p style="text-align:center;">暂无记录</p>' : recent.map(h => `<p style="text-align:center; font-size:0.8em;">${new Date(h.timestamp).toLocaleString()} - ${h.lottery==='dlt'?'大乐透':'双色球'} - ${h.numbers.fronts.join(' ')} | ${h.numbers.backs.join(' ')} (${h.score}分 ${h.rating})</p>`).join('')}
                </div>`;
        }

        function renderSettings() {
            document.getElementById('mainContent').innerHTML = `
                <div class="panel">
                    <div class="panel-title">⚙️ 系统设置</div>
                    <div style="margin-bottom:15px;">
                        <label style="color:var(--cyan);">🔊 摇奖音效</label>
                        <button class="btn small" onclick="STATE.settings.sound=!STATE.settings.sound; saveState(); this.textContent='音效 '+(STATE.settings.sound?'开':'关'); showToast('音效已'+(STATE.settings.sound?'开启':'关闭'));">音效 ${STATE.settings.sound?'开':'关'}</button>
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="color:var(--cyan);">🎵 背景音乐</label>
                        <button class="btn small" onclick="toggleMusic()">音乐 ${STATE.settings.music?'开':'关'}</button>
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="color:var(--cyan);">📁 上传自定义背景音乐 (MP3/WAV/OGG)</label>
                        <input type="file" id="musicFileInput" accept="audio/*" style="display:block; margin-top:8px; color:var(--text);">
                        <button class="btn small primary" onclick="uploadMusic()" style="margin-top:5px;">应用音乐</button>
                        ${STATE.customMusic ? '<span style="color:var(--green); margin-left:10px; font-size:0.8em;">✓ 已自定义</span>' : '<span style="color:#888; margin-left:10px; font-size:0.8em;">使用默认音乐</span>'}
                    </div>
                    <hr style="border-color:var(--border); margin:15px 0;">
                    <p style="font-size:0.8em;">当前 Supabase: <code style="color:var(--cyan);">${SUPABASE_URL || '未配置'}</code></p>
                    <button class="btn small danger" onclick="resetSystem()" style="margin-top:10px;">⚠️ 重置本地数据</button>
                </div>`;
        }

        function uploadMusic() {
            const fileInput = document.getElementById('musicFileInput');
            if (!fileInput || !fileInput.files || !fileInput.files[0]) {
                showToast('请先选择音频文件', '#FF4D6D');
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                STATE.customMusic = e.target.result;
                saveState();
                if (bgMusic) {
                    bgMusic.src = STATE.customMusic;
                    if (STATE.settings.music) bgMusic.play().catch(() => {});
                }
                showToast('🎵 背景音乐已更新！', '#00FF9D');
                renderSettings();
            };
            reader.readAsDataURL(file);
        }

        function resetSystem() {
            if (confirm('确定要重置所有本地数据吗？此操作不可恢复。')) {
                STATE.favorites = [];
                STATE.history = [];
                STATE.predictions = [];
                STATE.freePredictCount = 3;
                STATE.freeSimCount = 10;
                STATE.customMusic = null;
                saveState();
                renderSettings();
                showToast('系统数据已重置');
            }
        }
    </script>
</body>
</html>
