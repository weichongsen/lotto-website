<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <style>
        :root { --cyan:#00F5FF; --purple:#6E00FF; --green:#00FF9D; --red:#FF4D6D; --bg:#0B1020; --panel:rgba(10,18,40,0.85); --border:rgba(0,245,255,0.3); --glow:0 0 20px rgba(0,245,255,0.4); --text:#c8d6e5; --gold:#FFD700; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; overflow-x:hidden; min-height:100vh; user-select:none; -webkit-tap-highlight-color:transparent; }
        #particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .scanline { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.015) 2px,rgba(0,245,255,0.015) 4px); }
        #app { position:relative; z-index:10; display:flex; flex-direction:column; min-height:100vh; }
        .navbar { background:rgba(8,14,30,0.9); border-bottom:2px solid var(--border); backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; padding:8px 16px; gap:8px; box-shadow:0 4px 30px rgba(0,0,0,0.6); }
        .navbar .logo { font-size:1.3em; font-weight:900; background:linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; white-space:nowrap; }
        .navbar .nav-tabs { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
        .navbar .nav-tab { padding:7px 13px; border:1px solid rgba(0,245,255,0.35); border-radius:20px; cursor:pointer; font-size:0.78em; transition:all 0.3s; background:transparent; color:var(--text); white-space:nowrap; letter-spacing:1px; }
        .navbar .nav-tab:hover { border-color:var(--cyan); box-shadow:0 0 15px rgba(0,245,255,0.35); color:#fff; background:rgba(0,245,255,0.08); }
        .navbar .nav-tab.active { background:rgba(0,245,255,0.15); border-color:var(--cyan); color:#fff; box-shadow:var(--glow); font-weight:bold; }
        .navbar .lottery-switch { display:flex; gap:4px; background:rgba(0,0,0,0.4); border-radius:25px; padding:3px; border:1px solid var(--border); }
        .navbar .lottery-switch button { padding:7px 16px; border-radius:22px; border:none; cursor:pointer; font-weight:bold; font-size:0.8em; transition:all 0.3s; background:transparent; color:var(--text); letter-spacing:1px; }
        .navbar .lottery-switch button.active { background:var(--cyan); color:#000; box-shadow:0 0 20px rgba(0,245,255,0.6); }
        .main-content { flex:1; padding:16px; max-width:1400px; margin:0 auto; width:100%; }
        .panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; backdrop-filter:blur(10px); box-shadow:0 8px 40px rgba(0,0,0,0.5); position:relative; overflow:hidden; }
        .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0.6; }
        .panel-title { font-size:1.1em; font-weight:bold; color:var(--cyan); letter-spacing:2px; margin-bottom:14px; display:flex; align-items:center; gap:8px; text-transform:uppercase; }
        .panel-title::before { content:'◆'; font-size:0.6em; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .ball { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.2em; color:#fff; }
        .ball.front { background:radial-gradient(circle at 35% 30%,#ff6b8a,#c0392b 90%); box-shadow:0 0 25px rgba(255,77,109,0.6); }
        .ball.back { background:radial-gradient(circle at 35% 30%,#5dade2,#1a5276 90%); box-shadow:0 0 25px rgba(0,180,255,0.6); }
        .ball.rolling { animation:ballRoll 0.08s infinite; }
        @keyframes ballRoll { 0%{transform:translateY(-3px);} 50%{transform:translateY(3px);} 100%{transform:translateY(-3px);} }
        .ball.stopped { animation:ballStop 0.5s ease-out; }
        @keyframes ballStop { 0%{transform:scale(1.3);box-shadow:0 0 50px rgba(255,215,0,1);} 60%{transform:scale(0.9);} 100%{transform:scale(1);} }
        .btn { padding:10px 20px; border-radius:25px; border:1px solid var(--border); cursor:pointer; font-weight:bold; letter-spacing:1px; transition:all 0.3s; background:transparent; color:var(--text); font-family:inherit; font-size:0.85em; }
        .btn:hover { box-shadow:var(--glow); border-color:var(--cyan); color:#fff; transform:translateY(-2px); }
        .btn.primary { background:linear-gradient(135deg,rgba(0,245,255,0.2),rgba(110,0,255,0.2)); border-color:var(--cyan); color:#fff; }
        .btn.danger { border-color:var(--red); color:var(--red); }
        .btn.small { padding:5px 12px; font-size:0.7em; border-radius:15px; }
        .btn.vip { border-color:var(--gold); color:var(--gold); background:rgba(255,215,0,0.1); }
        .rating-badge { display:inline-block; padding:6px 16px; border-radius:20px; font-weight:900; font-size:1em; letter-spacing:2px; border:2px solid; }
        .rating-sss { border-color:#FFD700; color:#FFD700; box-shadow:0 0 30px rgba(255,215,0,0.7); animation:glowGold 1.5s infinite; }
        @keyframes glowGold { 0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.5);} 50%{box-shadow:0 0 45px rgba(255,215,0,1);} }
        .rating-ss { border-color:#ff6b9d; color:#ff6b9d; } .rating-s { border-color:#ff9f43; color:#ff9f43; }
        .rating-a { border-color:#54a0ff; color:#54a0ff; } .rating-b { border-color:#5f27cd; color:#5f27cd; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(5,8,20,0.95); display:flex; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(10px); }
        .overlay .login-title { font-size:2.8em; font-weight:900; letter-spacing:4px; background:linear-gradient(135deg,#FFD700,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:titleShine 3s infinite; margin-bottom:10px; }
        @keyframes titleShine { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.5);} }
        .overlay .login-subtitle { color:var(--cyan); letter-spacing:3px; margin-bottom:25px; font-size:0.9em; opacity:0.8; }
        .overlay .login-box { background:var(--panel); border:2px solid var(--border); border-radius:20px; padding:30px; width:90%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.7); }
        .overlay input { width:100%; padding:12px 16px; margin:8px 0; border-radius:25px; border:1px solid var(--border); background:rgba(0,0,0,0.4); color:#fff; font-family:inherit; font-size:0.9em; letter-spacing:1px; outline:none; }
        .overlay input:focus { border-color:var(--cyan); box-shadow:0 0 20px rgba(0,245,255,0.3); }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; z-index:8000; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .modal-content { background:var(--panel); border:2px solid var(--border); border-radius:20px; padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
        .toast { position:fixed; top:20px; right:20px; z-index:9999; padding:12px 20px; border-radius:25px; background:var(--panel); border:1px solid var(--green); color:var(--green); letter-spacing:1px; font-weight:bold; animation:toastIn 0.4s ease-out; box-shadow:0 8px 30px rgba(0,0,0,0.6); }
        @keyframes toastIn { from{opacity:0;transform:translateX(100px);} to{opacity:1;transform:translateX(0);} }
        .music-btn { position:fixed; bottom:20px; right:20px; z-index:1000; width:50px; height:50px; border-radius:50%; background:var(--panel); border:1px solid var(--border); color:var(--cyan); font-size:1.4em; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .pred-item { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.3); border-radius:12px; padding:8px 14px; }
        .ball-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        .vip-lock { color:var(--gold); font-size:0.8em; margin-left:4px; }
        .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
        .dashboard-card { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:12px; padding:15px; text-align:center; }
        .dashboard-value { font-size:1.6em; font-weight:bold; color:var(--cyan); }
        .dashboard-label { font-size:0.7em; color:var(--text); margin-top:4px; }
        table { width:100%; border-collapse:collapse; font-size:0.8em; }
        th,td { padding:8px; border:1px solid rgba(0,245,255,0.2); text-align:center; }
        th { background:rgba(0,245,255,0.1); color:var(--cyan); }
        .hidden { display:none !important; }
        .flex-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .grid-2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
        .chart-box { width:100%; height:350px; }
        .result-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    </style>
</head>

</div>

<script>
// 配置 Supabase
const SUPABASE_URL = 'https://qwvrojfdripeswuocgpo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_5c2rAccL-qR_QX7iAiQXiw_IdCVF_a4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATE = {
    lottery: 'dlt', currentTab: 'predict', user: null,
    favorites: [], predictions: [], history: [],
    settings: { sound: true, music: true, apiKey: '' },
    freeSimCount: 10, isRolling: false, customMusicUrl: null
};

// 粒子背景
const canvasP=document.getElementById('particleCanvas'),ctxP=canvasP.getContext('2d');
let particles=[],mouse={x:-999,y:-999};
function resizeC(){ canvasP.width=innerWidth; canvasP.height=innerHeight; }
resizeC(); window.addEventListener('resize',()=>{resizeC();initP();});
function initP(){ particles=[]; const n=Math.min(120,Math.floor((canvasP.width*canvasP.height)/8000)); for(let i=0;i<n;i++) particles.push({x:Math.random()*canvasP.width,y:Math.random()*canvasP.height,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,r:Math.random()*2+0.5,alpha:Math.random()*0.7+0.3,color:['#00F5FF','#6E00FF','#00FF9D','#FF4D6D'][Math.floor(Math.random()*4)]}); }
initP();
function animP(){ ctxP.clearRect(0,0,canvasP.width,canvasP.height); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<-20)p.x=canvasP.width+20;if(p.x>canvasP.width+20)p.x=-20;if(p.y<-20)p.y=canvasP.height+20;if(p.y>canvasP.height+20)p.y=-20;ctxP.beginPath();ctxP.arc(p.x,p.y,p.r,0,Math.PI*2);ctxP.fillStyle=p.color;ctxP.globalAlpha=p.alpha;ctxP.fill();});ctxP.globalAlpha=1;requestAnimationFrame(animP);}
animP();

let bgMusic=null;
function initMusic(){ if(!bgMusic){bgMusic=new Audio();bgMusic.loop=true;bgMusic.volume=0.3;} if(STATE.customMusicUrl)bgMusic.src=STATE.customMusicUrl;else bgMusic.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA='; if(STATE.settings.music)bgMusic.play().catch(()=>{}); }
function toggleMusic(){ STATE.settings.music=!STATE.settings.music;if(STATE.settings.music){if(bgMusic)bgMusic.play().catch(()=>{});showToast('音乐已开启');}else{if(bgMusic)bgMusic.pause();showToast('音乐已关闭');}document.getElementById('musicToggle').textContent=STATE.settings.music?'🎵':'🔇'; }
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playTick(){if(!STATE.settings.sound)return;try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=800+Math.random()*400;g.gain.value=0.05;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.stop(audioCtx.currentTime+0.1);}catch(e){}}
function playWin(){if(!STATE.settings.sound)return;try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=1200;g.gain.value=0.08;o.type='triangle';o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.stop(audioCtx.currentTime+0.3);}catch(e){}}

function showToast(msg,color='#00FF9D'){ const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.borderColor=color;t.style.color=color;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.5s';setTimeout(()=>t.remove(),500);},2000); }
function getCfg(){ return STATE.lottery==='dlt'?{name:'大乐透',fName:'前区',bName:'后区',fMax:35,fCnt:5,bMax:12,bCnt:2}:{name:'双色球',fName:'红球',bName:'蓝球',fMax:33,fCnt:6,bMax:16,bCnt:1}; }
function rInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function genRandom(cfg){ const f=new Set();while(f.size<cfg.fCnt)f.add(rInt(1,cfg.fMax));const b=new Set();while(b.size<cfg.bCnt)b.add(rInt(1,cfg.bMax));return{fronts:[...f].sort((a,b)=>a-b),backs:[...b].sort((a,b)=>a-b)}; }
function aiPredict(){ const cfg=getCfg();const nums=genRandom(cfg);const score=Math.min(99.9,70+Math.random()*25);let rating='B';if(score>=97)rating='SSS';else if(score>=93)rating='SS';else if(score>=88)rating='S';else if(score>=80)rating='A';return{numbers:nums,score:parseFloat(score.toFixed(1)),rating,timestamp:new Date().toISOString(),lottery:STATE.lottery}; }

function rollNumbersSequentially(containerId,fronts,backs,cfg,callback){
    const container=document.getElementById(containerId);if(!container)return;
    STATE.isRolling=true;container.innerHTML='';
    const all=[];fronts.forEach((n,i)=>all.push({num:n,type:'front',delay:i*600}));backs.forEach((n,i)=>all.push({num:n,type:'back',delay:(fronts.length+i)*600}));
    all.forEach(item=>{
        const ball=document.createElement('span');ball.className='ball rolling '+item.type;ball.textContent='?';ball.style.opacity='0.3';container.appendChild(ball);
        setTimeout(()=>{ball.style.opacity='1';ball.classList.add('rolling');let cur=rInt(1,item.type==='front'?cfg.fMax:cfg.bMax),cnt=0;const maxR=15+Math.floor(Math.random()*10);const iv=setInterval(()=>{cur=rInt(1,item.type==='front'?cfg.fMax:cfg.bMax);ball.textContent=String(cur).padStart(2,'0');cnt++;playTick();if(cnt>=maxR){clearInterval(iv);ball.textContent=String(item.num).padStart(2,'0');ball.classList.remove('rolling');ball.classList.add('stopped');playWin();setTimeout(()=>ball.classList.remove('stopped'),500);}},60);},item.delay);
    });
    setTimeout(()=>{STATE.isRolling=false;if(callback)callback();},all.length*600+1000);
}

function isVIP(){ return STATE.user?.vip; }
function isAdmin(){ return STATE.user?.role==='admin'; }
function requireVIP(act){ if(!isVIP()){showToast('🔒 '+act+'需要VIP','#FFD700');showVIPModal();return false;}return true; }

// 支付弹窗 - 两步验证
function showVIPModal(){
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-content" id="vipModalContent">
            <h3 style="color:var(--gold);">✨ 升级VIP</h3>
            <p>无限次预测 · 全部高级功能</p>
            <p style="color:var(--cyan); font-size:1.3em;">¥9.9 / 月</p>
            <button class="btn primary" id="btnPay">💳 去支付</button>
            <button class="btn" id="btnVerify" style="display:none;" onclick="verifyPayment(this)">✅ 我已完成支付，验证</button>
            <button class="btn small" onclick="this.closest('.modal').remove()">取消</button>
            <p id="payHint" style="font-size:0.8em; color:var(--text); margin-top:10px;"></p>
        </div>`;
    document.body.appendChild(modal);
    document.getElementById('btnPay').addEventListener('click', function() {
        // 模拟跳转支付
        showToast('请完成支付（模拟中...）', '#FFD700');
        document.getElementById('payHint').textContent = '支付完成后请点击下方验证按钮';
        document.getElementById('btnPay').style.display = 'none';
        document.getElementById('btnVerify').style.display = 'inline-block';
    });
}

async function verifyPayment(btn) {
    btn.disabled = true;
    btn.textContent = '验证中...';
    // 实际支付验证（模拟）
    const { error } = await sb.from('payments').insert({
        user_id: STATE.user.id,
        amount: 9.9,
        status: 'success'
    });
    if (error) {
        showToast('验证失败，请重试', '#FF4D6D');
        btn.disabled = false;
        btn.textContent = '✅ 我已完成支付，验证';
        return;
    }
    // 升级VIP
    await sb.from('profiles').update({ vip: true }).eq('id', STATE.user.id);
    STATE.user.vip = true;
    updateVIPUI();
    document.querySelector('.modal')?.remove();
    showToast('🎉 支付验证成功！VIP已激活', '#FFD700');
}

function updateVIPUI(){ document.getElementById('vipBadge').style.display=isVIP()?'inline':'none';document.querySelectorAll('.vip-lock').forEach(l=>l.style.display=isVIP()?'none':'inline');document.getElementById('userDisplay').textContent=STATE.user?.email||'';document.getElementById('logoutBtn').style.display=STATE.user?'inline-block':'none';if(isAdmin())document.getElementById('adminTab').style.display='inline-block'; }

// 认证（增加onConflict）
async function handleRegister(){
    const email=document.getElementById('regEmail').value.trim();
    const password=document.getElementById('regPass').value.trim();
    if(!email||password.length<6){showToast('邮箱和密码至少6位','#FF4D6D');return;}
    const{data,error}=await sb.auth.signUp({email,password});
    if(error){showToast('注册失败:'+error.message,'#FF4D6D');return;}
    if(data.user){
        await sb.from('profiles').upsert({id:data.user.id,email,role:'user',vip:false}, {onConflict: 'id'});
        STATE.user={id:data.user.id,email,role:'user',vip:false};
        enterApp();
        showToast('注册成功！新账号每天3次免费机会');
    }
}
async function handleLogin(){
    const email=document.getElementById('loginEmail').value.trim();
    const password=document.getElementById('loginPass').value.trim();
    if(!email||!password){showToast('请输入邮箱和密码','#FF4D6D');return;}
    const{data,error}=await sb.auth.signInWithPassword({email,password});
    if(error){showToast('登录失败:'+error.message,'#FF4D6D');return;}
    if(data.user){
        await loadUserProfile(data.user);
        enterApp();
    }
}
async function loadUserProfile(authUser){
    const{data:profile}=await sb.from('profiles').select('*').eq('id',authUser.id).single();
    STATE.user={id:authUser.id,email:authUser.email,role:profile?.role||'user',vip:profile?.vip||false};
    STATE.customMusicUrl=profile?.custom_music_url||null;
}
async function logout(){ await sb.auth.signOut();STATE.user=null;location.reload(); }
function showRegister(){ document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('registerOverlay').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerOverlay').classList.add('hidden');document.getElementById('loginOverlay').classList.remove('hidden'); }
async function enterApp(){ document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('registerOverlay').classList.add('hidden');document.getElementById('app').classList.remove('hidden');updateVIPUI();switchTab('predict');initMusic(); }

async function initSession(){ const{data:{session}}=await sb.auth.getSession();if(session?.user){await loadUserProfile(session.user);enterApp();} }
initSession();

// 每日次数
async function getTodayUsageCount(){ const today=new Date().toISOString().slice(0,10);const{data}=await sb.from('daily_usage').select('count').eq('user_id',STATE.user.id).eq('date',today).single();return data?.count||0; }
async function checkPredictionLimit(){ if(isVIP())return true;const used=await getTodayUsageCount();if(used>=3){showVIPModal();return false;}return true; }
async function incrementUsage(){ if(isVIP())return;const today=new Date().toISOString().slice(0,10);const{data:row}=await sb.from('daily_usage').select('count').eq('user_id',STATE.user.id).eq('date',today).single();if(row){await sb.from('daily_usage').update({count:row.count+1}).eq('user_id',STATE.user.id).eq('date',today);}else{await sb.from('daily_usage').insert({user_id:STATE.user.id,date:today,count:1});} }

// 导航
function switchTab(tab){ STATE.currentTab=tab;document.querySelectorAll('#navTabs .nav-tab').forEach(t=>t.classList.remove('active'));const el=document.querySelector(`#navTabs .nav-tab[data-tab="${tab}"]`);if(el)el.classList.add('active');switch(tab){case'predict':renderPredict();break;case'analysis':if(!requireVIP('分析中心'))return;renderAnalysis();break;case'lab':if(!requireVIP('实验室'))return;renderLab();break;case'charts':if(!requireVIP('图表中心'))return;renderCharts();break;case'simulator':renderSimulator();break;case'results':renderResults();break;case'favorites':if(!requireVIP('收藏中心'))return;renderFavorites();break;case'history':if(!requireVIP('预测历史'))return;renderHistory();break;case'admin':if(!isAdmin()){showToast('权限不足');return;}renderAdmin();break;case'settings':renderSettings();break;} }
document.getElementById('navTabs').addEventListener('click',e=>{const tab=e.target.closest('.nav-tab');if(tab)switchTab(tab.dataset.tab);});
function switchLottery(type){ STATE.lottery=type;document.getElementById('btnDLT').classList.toggle('active',type==='dlt');document.getElementById('btnSSQ').classList.toggle('active',type==='ssq');switchTab(STATE.currentTab); }

// 预测页面
async function renderPredict(){
    const used=isVIP()?0:await getTodayUsageCount();
    const left=isVIP()?'∞':Math.max(0,3-used);
    document.getElementById('mainContent').innerHTML=`
        <div class="panel" style="text-align:center;">
            <div class="panel-title">🤖 AI预测中心 - ${getCfg().name} (剩余 <span id="freeCountDisplay">${left}</span> 次${!isVIP()?'/3':''})</div>
            <div id="predictResult"></div>
            <div class="flex-row" style="justify-content:center;margin-top:15px;">
                <button class="btn primary" onclick="doPredict(1)">预测1组</button>
                <button class="btn" onclick="doPredict(5)">5组</button>
                <button class="btn" onclick="doPredict(10)">10组</button>
                <button class="btn" onclick="randomPick()">随机</button>
            </div>
        </div>
        <div class="panel" id="aiDashboardPanel">
            <div class="panel-title">📡 AI数据大屏</div>
            ${buildDashboardHTML()}
        </div>`;
}
function buildDashboardHTML(){ const all=STATE.history;const total=all.length;const avg=total>0?(all.reduce((s,h)=>s+h.score,0)/total).toFixed(1):'-';return`<div class="dashboard-grid"><div class="dashboard-card"><div class="dashboard-value">${total}</div><div class="dashboard-label">总预测</div></div><div class="dashboard-card"><div class="dashboard-value">${avg}</div><div class="dashboard-label">平均分</div></div></div>`; }

async function doPredict(count){
    if(!await checkPredictionLimit()) return;
    await incrementUsage();
    const cfg=getCfg();const container=document.getElementById('predictResult');container.innerHTML='';
    const preds=[];for(let i=0;i<count;i++){const p=aiPredict();preds.push(p);STATE.predictions.unshift(p);STATE.history.unshift({...p,id:Date.now()});if(sb&&STATE.user){sb.from('predictions').insert({user_id:STATE.user.id,lottery:p.lottery,fronts:p.numbers.fronts.join(','),backs:p.numbers.backs.join(','),score:p.score,rating:p.rating}).then();}}
    const perRow=count===10?5:count;let idx=0;
    function showNext(){
        if(idx>=preds.length){
            updateDashboard();
            getTodayUsageCount().then(used=>{
                const left=isVIP()?'∞':Math.max(0,3-used);
                const el=document.getElementById('freeCountDisplay');
                if(el) el.textContent=left;
            });
            return;
        }
        const p=preds[idx];
        const rowIdx=Math.floor(idx/perRow);
        let rowEl=container.querySelector(`#predRow${rowIdx}`);
        if(!rowEl){rowEl=document.createElement('div');rowEl.id=`predRow${rowIdx}`;rowEl.className='flex-row';rowEl.style.justifyContent='center';rowEl.style.marginBottom='10px';container.appendChild(rowEl);}
        const item=document.createElement('div');item.className='pred-item';
        item.innerHTML=`<span style="color:var(--green);font-weight:bold;min-width:40px;">${p.score}分</span><span class="rating-badge rating-${p.rating.toLowerCase()}" style="font-size:0.7em;padding:3px 8px;">${p.rating}</span><span class="ball-row" id="ballArea${idx}"></span>`;
        rowEl.appendChild(item);
        const ballArea=document.getElementById(`ballArea${idx}`);
        const allBalls=[...p.numbers.fronts.map(n=>({num:n,type:'front'})),...p.numbers.backs.map(n=>({num:n,type:'back'}))];
        allBalls.forEach((b,i)=>{const span=document.createElement('span');span.className='ball rolling '+b.type;span.textContent='?';span.style.opacity='0.3';span.style.width='38px';span.style.height='38px';span.style.fontSize='0.85em';ballArea.appendChild(span);setTimeout(()=>{span.style.opacity='1';let cur=rInt(1,b.type==='front'?cfg.fMax:cfg.bMax);let cnt=0;const maxR=12+Math.floor(Math.random()*8);const iv=setInterval(()=>{cur=rInt(1,b.type==='front'?cfg.fMax:cfg.bMax);span.textContent=String(cur).padStart(2,'0');cnt++;playTick();if(cnt>=maxR){clearInterval(iv);span.textContent=String(b.num).padStart(2,'0');span.classList.remove('rolling');span.classList.add('stopped');playWin();setTimeout(()=>span.classList.remove('stopped'),500);}},60);},i*500+100);});
        idx++;setTimeout(showNext,allBalls.length*500+400);
    }
    showNext();
}
function randomPick(){ const cfg=getCfg();const nums=genRandom(cfg);const score=(70+Math.random()*20).toFixed(1);const rating=score>=85?'S':score>=75?'A':'B';document.getElementById('predictResult').innerHTML=`<div class="flex-row" style="justify-content:center;"><div class="pred-item"><span style="color:var(--green);font-weight:bold;">${score}分</span><span class="rating-badge rating-${rating.toLowerCase()}">${rating}</span><span class="ball-row">${nums.fronts.map(n=>`<span class="ball front" style="width:38px;height:38px;font-size:0.85em;">${String(n).padStart(2,'0')}</span>`).join('')}${nums.backs.map(n=>`<span class="ball back" style="width:38px;height:38px;font-size:0.85em;">${String(n).padStart(2,'0')}</span>`).join('')}</span></div></div>`; }

function renderAnalysis(){ document.getElementById('mainContent').innerHTML='<div class="panel">📊 分析中心 (VIP)</div>'; }
function renderLab(){ document.getElementById('mainContent').innerHTML='<div class="panel">🧪 实验室 (VIP)</div>'; }
function renderCharts(){ document.getElementById('mainContent').innerHTML='<div class="panel"><div class="chart-box" id="mainChart"></div></div>';setTimeout(()=>{const el=document.getElementById('mainChart');if(el){const c=echarts.init(el);c.setOption({xAxis:{data:['A','B']},yAxis:{},series:[{data:[1,2],type:'line'}]});}},300); }
function renderSimulator(){ const left=isVIP()?'∞':STATE.freeSimCount;document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">🎰 ${getCfg().name}摇奖 (剩余${left}次)</div><div class="ball-container" id="simBalls"></div><button class="btn primary" onclick="startSim()">开始</button></div>`; }
function startSim(){ if(!isVIP()&&STATE.freeSimCount<=0){showVIPModal();return;}if(!isVIP())STATE.freeSimCount--;const cfg=getCfg();rollNumbersSequentially('simBalls',genRandom(cfg).fronts,genRandom(cfg).backs,cfg); }
function renderResults(){ document.getElementById('mainContent').innerHTML='<div class="panel">📡 开奖 (近20期)</div>'; }
function renderFavorites(){ document.getElementById('mainContent').innerHTML='<div class="panel">⭐ 收藏</div>'; }
function renderHistory(){ document.getElementById('mainContent').innerHTML='<div class="panel">📋 历史</div>'; }
function renderAdmin(){ document.getElementById('mainContent').innerHTML='<div class="panel">👑 管理后台</div>'; }
function renderSettings(){ document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">⚙️ 设置</div><button class="btn small" onclick="STATE.settings.sound=!STATE.settings.sound;this.textContent='音效 '+(STATE.settings.sound?'开':'关');">音效 ${STATE.settings.sound?'开':'关'}</button><button class="btn small" onclick="toggleMusic()">音乐 ${STATE.settings.music?'开':'关'}</button><div style="margin-top:10px;"><input type="file" id="musicFileInput" accept="audio/*"><button class="btn small" onclick="uploadMusic()">上传音乐</button></div></div>`; }
function updateDashboard(){ const p=document.getElementById('aiDashboardPanel');if(p)p.innerHTML=`<div class="panel-title">📡 AI数据大屏</div>${buildDashboardHTML()}`; }

// 修复音乐上传
async function uploadMusic(){
    const file=document.getElementById('musicFileInput').files[0];
    if(!file) return;
    const fileName = `${STATE.user.id}_${Date.now()}.mp3`;
    const { error } = await sb.storage.from('music').upload(fileName, file);
    if(error){
        showToast('上传失败，请检查存储桶权限','#FF4D6D');
        return;
    }
    const { data: urlData } = sb.storage.from('music').getPublicUrl(fileName);
    const publicUrl = urlData.publicUrl;
    STATE.customMusicUrl = publicUrl;
    await sb.from('profiles').update({ custom_music_url: publicUrl }).eq('id', STATE.user.id);
    if(bgMusic){
        bgMusic.src = publicUrl;
        if(STATE.settings.music) bgMusic.play().catch(()=>{});
    }
    showToast('音乐已同步到云端');
}
</script>
