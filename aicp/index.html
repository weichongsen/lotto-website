<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI彩票预测专家 Pro Max | Cyberpunk Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cyan: #00F5FF; --purple: #6E00FF; --green: #00FF9D; --red: #FF4D6D;
            --bg: #0B1020; --panel: rgba(10,18,40,0.85); --border: rgba(0,245,255,0.3);
            --glow: 0 0 20px rgba(0,245,255,0.4); --text: #c8d6e5; --gold: #FFD700;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; overflow-x:hidden; min-height:100vh; user-select:none; -webkit-tap-highlight-color:transparent; }
        #particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .scanline { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.015) 2px,rgba(0,245,255,0.015) 4px); }
        #app { position:relative; z-index:10; display:flex; flex-direction:column; min-height:100vh; }
        .navbar { background:rgba(8,14,30,0.9); border-bottom:2px solid var(--border); backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; padding:8px 16px; gap:8px; box-shadow:0 4px 30px rgba(0,0,0,0.6); }
        .navbar .logo { font-size:1.3em; font-weight:900; background:linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; white-space:nowrap; }
        .navbar .nav-tabs { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
        .navbar .nav-tab { padding:7px 13px; border:1px solid rgba(0,245,255,0.35); border-radius:20px; cursor:pointer; font-size:0.78em; transition:all 0.3s; background:transparent; color:var(--text); white-space:nowrap; letter-spacing:1px; }
        .navbar .nav-tab:hover { border-color:var(--cyan); box-shadow:0 0 15px rgba(0,245,255,0.35); color:#fff; background:rgba(0,245,255,0.08); }
        .navbar .nav-tab.active { background:rgba(0,245,255,0.15); border-color:var(--cyan); color:#fff; box-shadow:var(--glow); font-weight:bold; }
        .navbar .lottery-switch { display:flex; gap:4px; background:rgba(0,0,0,0.4); border-radius:25px; padding:3px; border:1px solid var(--border); }
        .navbar .lottery-switch button { padding:7px 16px; border-radius:22px; border:none; cursor:pointer; font-weight:bold; font-size:0.8em; transition:all 0.3s; background:transparent; color:var(--text); letter-spacing:1px; }
        .navbar .lottery-switch button.active { background:var(--cyan); color:#000; box-shadow:0 0 20px rgba(0,245,255,0.6); }
        .main-content { flex:1; padding:16px; max-width:1400px; margin:0 auto; width:100%; }
        .panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; backdrop-filter:blur(10px); box-shadow:0 8px 40px rgba(0,0,0,0.5); position:relative; overflow:hidden; }
        .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0.6; }
        .panel-title { font-size:1.1em; font-weight:bold; color:var(--cyan); letter-spacing:2px; margin-bottom:14px; display:flex; align-items:center; gap:8px; text-transform:uppercase; }
        .panel-title::before { content:'◆'; font-size:0.6em; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .ball-container { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; }
        .ball { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.2em; color:#fff; position:relative; box-shadow:0 0 25px rgba(0,245,255,0.5),inset 0 -4px 8px rgba(0,0,0,0.3); transition:transform 0.2s; }
        .ball.front { background:radial-gradient(circle at 35% 30%,#ff6b8a,#c0392b 90%); box-shadow:0 0 25px rgba(255,77,109,0.6); }
        .ball.back { background:radial-gradient(circle at 35% 30%,#5dade2,#1a5276 90%); box-shadow:0 0 25px rgba(0,180,255,0.6); }
        .ball.rolling { animation:ballRoll 0.08s infinite; }
        @keyframes ballRoll { 0%{transform:translateY(-3px);} 50%{transform:translateY(3px);} 100%{transform:translateY(-3px);} }
        .ball.stopped { animation:ballStop 0.5s ease-out; }
        @keyframes ballStop { 0%{transform:scale(1.3);box-shadow:0 0 50px rgba(255,215,0,1);} 60%{transform:scale(0.9);} 100%{transform:scale(1);} }
        .btn { padding:10px 20px; border-radius:25px; border:1px solid var(--border); cursor:pointer; font-weight:bold; letter-spacing:1px; transition:all 0.3s; background:transparent; color:var(--text); font-family:inherit; font-size:0.85em; white-space:nowrap; }
        .btn:hover { box-shadow:var(--glow); border-color:var(--cyan); color:#fff; transform:translateY(-2px); }
        .btn.primary { background:linear-gradient(135deg,rgba(0,245,255,0.2),rgba(110,0,255,0.2)); border-color:var(--cyan); color:#fff; box-shadow:0 0 20px rgba(0,245,255,0.25); }
        .btn.danger { border-color:var(--red); color:var(--red); }
        .btn.small { padding:5px 12px; font-size:0.7em; border-radius:15px; }
        .btn.vip { border-color:var(--gold); color:var(--gold); background:rgba(255,215,0,0.1); }
        .rating-badge { display:inline-block; padding:6px 16px; border-radius:20px; font-weight:900; font-size:1em; letter-spacing:2px; border:2px solid; }
        .rating-sss { border-color:#FFD700; color:#FFD700; box-shadow:0 0 30px rgba(255,215,0,0.7); animation:glowGold 1.5s infinite; }
        @keyframes glowGold { 0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.5);} 50%{box-shadow:0 0 45px rgba(255,215,0,1);} }
        .rating-ss { border-color:#ff6b9d; color:#ff6b9d; } .rating-s { border-color:#ff9f43; color:#ff9f43; }
        .rating-a { border-color:#54a0ff; color:#54a0ff; } .rating-b { border-color:#5f27cd; color:#5f27cd; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(5,8,20,0.95); display:flex; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(10px); }
        .overlay .login-title { font-size:2.8em; font-weight:900; letter-spacing:4px; text-align:center; margin-bottom:10px; background:linear-gradient(135deg,#FFD700,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:titleShine 3s infinite; }
        @keyframes titleShine { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.5);} }
        .overlay .login-subtitle { color:var(--cyan); letter-spacing:3px; margin-bottom:25px; font-size:0.9em; opacity:0.8; }
        .overlay .login-box { background:var(--panel); border:2px solid var(--border); border-radius:20px; padding:30px; width:90%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.7); }
        .overlay input { width:100%; padding:12px 16px; margin:8px 0; border-radius:25px; border:1px solid var(--border); background:rgba(0,0,0,0.4); color:#fff; font-family:inherit; font-size:0.9em; letter-spacing:1px; outline:none; transition:all 0.3s; }
        .overlay input:focus { border-color:var(--cyan); box-shadow:0 0 20px rgba(0,245,255,0.3); }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; z-index:8000; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .modal-content { background:var(--panel); border:2px solid var(--border); border-radius:20px; padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
        .toast { position:fixed; top:20px; right:20px; z-index:9999; padding:12px 20px; border-radius:25px; background:var(--panel); border:1px solid var(--green); color:var(--green); letter-spacing:1px; font-weight:bold; animation:toastIn 0.4s ease-out; box-shadow:0 8px 30px rgba(0,0,0,0.6); }
        @keyframes toastIn { from{opacity:0;transform:translateX(100px);} to{opacity:1;transform:translateX(0);} }
        .music-btn { position:fixed; bottom:20px; right:20px; z-index:1000; width:50px; height:50px; border-radius:50%; background:var(--panel); border:1px solid var(--border); color:var(--cyan); font-size:1.4em; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; }
        .predict-row { display:flex; align-items:center; gap:15px; margin:10px 0; flex-wrap:wrap; }
        .predict-left { min-width:80px; text-align:center; }
        .predict-right { flex:1; display:flex; flex-direction:row; gap:8px; align-items:center; flex-wrap:wrap; }
        .ball-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        .vip-lock { color:var(--gold); font-size:0.8em; margin-left:4px; }
        .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
        .dashboard-card { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:12px; padding:15px; text-align:center; }
        .dashboard-value { font-size:1.6em; font-weight:bold; color:var(--cyan); }
        .dashboard-label { font-size:0.7em; color:var(--text); margin-top:4px; }
        table { width:100%; border-collapse:collapse; font-size:0.8em; }
        th,td { padding:8px 10px; border:1px solid rgba(0,245,255,0.2); text-align:center; }
        th { background:rgba(0,245,255,0.1); color:var(--cyan); font-weight:bold; }
        tr:hover td { background:rgba(0,245,255,0.04); }
        @media(max-width:768px){ .navbar .nav-tab{padding:5px 9px;font-size:0.65em;} .navbar .logo{font-size:1em;} .ball{width:38px;height:38px;font-size:0.9em;} .overlay .login-title{font-size:1.8em;} .panel{padding:12px;} .dashboard-value{font-size:1.2em;} }
        .hidden { display:none !important; }
        .flex-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .grid-2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
        .chart-box { width:100%; height:350px; }
        .pred-group { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:8px; }
        .pred-item { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.3); border-radius:12px; padding:8px 14px; }
    </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="scanline"></div>

<!-- 登录 -->

</div>

<!-- 主应用 -->
<div id="app" class="hidden">
    <nav class="navbar">
        <span class="logo">⚡ AI预测 Pro Max</span>
        <div class="lottery-switch">
            <button id="btnDLT" class="active" onclick="switchLottery('dlt')">大乐透</button>

            <span class="nav-tab active" data-tab="predict">🎯 AI预测</span>
            <span class="nav-tab" data-tab="analysis">📊 分析 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="lab">🧪 实验室 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="charts">📈 图表 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="simulator">🎰 摇奖</span>
            <span class="nav-tab" data-tab="results">📡 开奖</span>
            <span class="nav-tab" data-tab="favorites">⭐ 收藏 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="history">📋 历史 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="admin" id="adminTab" style="display:none;">👑 管理</span>
            <span class="nav-tab" data-tab="settings">⚙️ 设置</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap;">
            <span id="vipBadge" style="color:var(--gold);font-weight:bold;display:none;">👑 VIP</span>
            <button class="btn small vip" onclick="showVIPModal()">升级VIP</button>
            <span style="color:var(--text);font-size:0.8em;" id="userDisplay"></span>
            <button class="btn small danger" onclick="logout()" style="display:none;" id="logoutBtn">退出</button>
        </div>
    </nav>
    <div class="main-content" id="mainContent"></div>
    <footer style="text-align:center;padding:16px;font-size:0.7em;opacity:0.5;letter-spacing:2px;">AI彩票预测专家 Pro Max · 仅用于数据分析与可视化 · 不保证预测准确性</footer>
</div>
<div id="toastContainer"></div>
<div class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵</div>

<script>
// ========== Supabase 配置 ==========
  const SUPABASE_URL = 'https://qwvrojfdripeswuocgpo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_5c2rAccL-qR_QX7iAiQXiw_IdCVF_a4';
let sb = null;
try { if(SUPABASE_URL&&SUPABASE_ANON_KEY&&SUPABASE_URL!=='https://your-project.supabase.co') sb = supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); } catch(e){ console.warn('Supabase未连接'); }

const STATE = {
    lottery:'dlt',currentTab:'predict',user:null,favorites:[],predictions:[],history:[],
    settings:{sound:true,music:true,weights:{hot:20,cold:10,miss:20,markov:20,monte:15,bayes:5},strategy:'balanced',apiKey:''},
    freePredictCount:3,freeSimCount:10,isRolling:false,customMusic:null
};

function loadState(){ try{ const r=localStorage.getItem('lottery_pro_max'); if(r){ const d=JSON.parse(r); STATE.favorites=d.favorites||[]; STATE.predictions=d.predictions||[]; STATE.history=d.history||[]; STATE.settings={...STATE.settings,...d.settings}; STATE.user=d.user||null; STATE.freePredictCount=d.freePredictCount??3; STATE.freeSimCount=d.freeSimCount??10; STATE.customMusic=d.customMusic||null; } }catch(e){} }
function saveState(){ localStorage.setItem('lottery_pro_max',JSON.stringify({favorites:STATE.favorites,predictions:STATE.predictions,history:STATE.history,settings:STATE.settings,user:STATE.user,freePredictCount:STATE.freePredictCount,freeSimCount:STATE.freeSimCount,customMusic:STATE.customMusic})); }
loadState();

// 粒子
const canvasP=document.getElementById('particleCanvas'),ctxP=canvasP.getContext('2d');
let particles=[],mouse={x:-999,y:-999};
function resizeC(){ canvasP.width=innerWidth; canvasP.height=innerHeight; }
resizeC(); window.addEventListener('resize',()=>{resizeC();initP();});
function initP(){ particles=[]; const n=Math.min(120,Math.floor((canvasP.width*canvasP.height)/8000)); for(let i=0;i<n;i++) particles.push({x:Math.random()*canvasP.width,y:Math.random()*canvasP.height,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,r:Math.random()*2+0.5,alpha:Math.random()*0.7+0.3,color:['#00F5FF','#6E00FF','#00FF9D','#FF4D6D'][Math.floor(Math.random()*4)]}); }
initP();
function animP(){ ctxP.clearRect(0,0,canvasP.width,canvasP.height); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<-20)p.x=canvasP.width+20;if(p.x>canvasP.width+20)p.x=-20;if(p.y<-20)p.y=canvasP.height+20;if(p.y>canvasP.height+20)p.y=-20;ctxP.beginPath();ctxP.arc(p.x,p.y,p.r,0,Math.PI*2);ctxP.fillStyle=p.color;ctxP.globalAlpha=p.alpha;ctxP.fill();});ctxP.globalAlpha=1;requestAnimationFrame(animP);}
animP();

// 音效
let bgMusic=null;
function initMusic(){ if(!bgMusic){bgMusic=new Audio();bgMusic.loop=true;bgMusic.volume=0.3;} if(STATE.customMusic)bgMusic.src=STATE.customMusic;else bgMusic.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA='; if(STATE.settings.music)bgMusic.play().catch(()=>{}); }
function toggleMusic(){ STATE.settings.music=!STATE.settings.music;saveState();if(STATE.settings.music){if(bgMusic)bgMusic.play().catch(()=>{});showToast('音乐已开启');}else{if(bgMusic)bgMusic.pause();showToast('音乐已关闭');}document.getElementById('musicToggle').textContent=STATE.settings.music?'🎵':'🔇'; }
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playTick(){if(!STATE.settings.sound)return;try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=800+Math.random()*400;g.gain.value=0.05;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.stop(audioCtx.currentTime+0.1);}catch(e){}}
function playWin(){if(!STATE.settings.sound)return;try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=1200;g.gain.value=0.08;o.type='triangle';o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.stop(audioCtx.currentTime+0.3);}catch(e){}}

function showToast(msg,color='#00FF9D'){ const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.borderColor=color;t.style.color=color;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.5s';setTimeout(()=>t.remove(),500);},2000); }
function getCfg(){ return STATE.lottery==='dlt'?{name:'大乐透',fName:'前区',bName:'后区',fMax:35,fCnt:5,bMax:12,bCnt:2}:{name:'双色球',fName:'红球',bName:'蓝球',fMax:33,fCnt:6,bMax:16,bCnt:1}; }
function rInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function genRandom(cfg){ const f=new Set();while(f.size<cfg.fCnt)f.add(rInt(1,cfg.fMax));const b=new Set();while(b.size<cfg.bCnt)b.add(rInt(1,cfg.bMax));return{fronts:[...f].sort((a,b)=>a-b),backs:[...b].sort((a,b)=>a-b)}; }
function aiPredict(){ const cfg=getCfg();const nums=genRandom(cfg);const score=Math.min(99.9,70+Math.random()*25);let rating='B';if(score>=97)rating='SSS';else if(score>=93)rating='SS';else if(score>=88)rating='S';else if(score>=80)rating='A';return{numbers:nums,score:parseFloat(score.toFixed(1)),rating,timestamp:new Date().toISOString(),lottery:STATE.lottery}; }

function rollNumbersSequentially(containerId,fronts,backs,cfg,callback){
    const container=document.getElementById(containerId);if(!container)return;
    STATE.isRolling=true;container.innerHTML='';
    const all=[];
    fronts.forEach((n,i)=>all.push({num:n,type:'front',delay:i*600}));
    backs.forEach((n,i)=>all.push({num:n,type:'back',delay:(fronts.length+i)*600}));
    all.forEach(item=>{
        const ball=document.createElement('span');ball.className='ball rolling '+item.type;ball.textContent='?';ball.style.opacity='0.3';container.appendChild(ball);
        setTimeout(()=>{
            ball.style.opacity='1';ball.classList.add('rolling');
            let cur=rInt(1,item.type==='front'?cfg.fMax:cfg.bMax),cnt=0;const maxRolls=15+Math.floor(Math.random()*10);
            const interval=setInterval(()=>{cur=rInt(1,item.type==='front'?cfg.fMax:cfg.bMax);ball.textContent=String(cur).padStart(2,'0');cnt++;playTick();if(cnt>=maxRolls){clearInterval(interval);ball.textContent=String(item.num).padStart(2,'0');ball.classList.remove('rolling');ball.classList.add('stopped');playWin();setTimeout(()=>ball.classList.remove('stopped'),500);}},60);
        },item.delay);
    });
    const totalDuration=all.length?all[all.length-1].delay+1000:400;
    setTimeout(()=>{STATE.isRolling=false;if(callback)callback();},totalDuration);
}

function isVIP(){ return STATE.user&&STATE.user.vip; }
function isAdmin(){ return STATE.user&&STATE.user.role==='admin'; }

// 核心：免费次数用完直接弹窗，不预测
async function checkPredictionLimit(){
    if (isVIP()) return true;
    const today = new Date().toISOString().slice(0,10);
    if (sb && STATE.user) {
        const { data } = await sb.from('daily_usage').select('count').eq('user_id', STATE.user.id).eq('date', today).single();
        if (data && data.count >= 3) {
            showVIPModal();
            return false;
        }
    } else {
        if (STATE.freePredictCount <= 0) {
            showVIPModal();
            return false;
        }
    }
    return true;
}
async function incrementUsage(){
    if (isVIP()) return;
    const today = new Date().toISOString().slice(0,10);
    if (sb && STATE.user) {
        await sb.from('daily_usage').upsert({user_id:STATE.user.id,date:today,count:1},{onConflict:'user_id,date'}).then(()=>{}).catch(()=>{});
    } else {
        STATE.freePredictCount--;
        saveState();
    }
}

function getHotNumbers(count){ const freq={};STATE.history.filter(h=>h.lottery===STATE.lottery).forEach(h=>{h.numbers.fronts.forEach(n=>{freq[n]=(freq[n]||0)+1;});});return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,count).map(([n])=>+n).sort((a,b)=>a-b); }

async function doPredict(count){
    if (!await checkPredictionLimit()) return;
    await incrementUsage();
    await logAction('predict',{count});
    const cfg=getCfg();const container=document.getElementById('predictResult');container.innerHTML='';
    const preds=[];for(let i=0;i<count;i++){const p=aiPredict();preds.push(p);STATE.predictions.unshift(p);STATE.history.unshift({...p,id:Date.now()+i});if(sb&&STATE.user&&STATE.user.id!=='guest'){sb.from('predictions').insert({user_id:STATE.user.id,lottery:p.lottery,fronts:p.numbers.fronts.join(','),backs:p.numbers.backs.join(','),score:p.score,rating:p.rating}).then(()=>{}).catch(()=>{});}}
    saveState();

    const perRow = count===10 ? 5 : count;
    const rows = Math.ceil(count/perRow);
    let idx=0;
    function showNext(){
        if(idx>=preds.length){updateDashboard();return;}
        const p=preds[idx];
        const rowIdx=Math.floor(idx/perRow);
        let rowEl=container.querySelector(`#predRow${rowIdx}`);
        if(!rowEl){rowEl=document.createElement('div');rowEl.id=`predRow${rowIdx}`;rowEl.className='flex-row';rowEl.style.justifyContent='center';rowEl.style.marginBottom='10px';container.appendChild(rowEl);}
        const item=document.createElement('div');item.className='pred-item';
        item.innerHTML=`<span style="color:var(--green);font-weight:bold;min-width:40px;">${p.score}分</span><span class="rating-badge rating-${p.rating.toLowerCase()}" style="font-size:0.7em;padding:3px 8px;">${p.rating}</span><span class="ball-row" id="ballArea${idx}"></span>`;
        rowEl.appendChild(item);
        const ballArea=document.getElementById(`ballArea${idx}`);
        const allBalls=[...p.numbers.fronts.map(n=>({num:n,type:'front'})),...p.numbers.backs.map(n=>({num:n,type:'back'}))];
        allBalls.forEach((b,i)=>{
            const span=document.createElement('span');span.className='ball rolling '+b.type;span.textContent='?';span.style.opacity='0.3';span.style.width='38px';span.style.height='38px';span.style.fontSize='0.85em';ballArea.appendChild(span);
            setTimeout(()=>{span.style.opacity='1';let cur=rInt(1,b.type==='front'?cfg.fMax:cfg.bMax);let cnt=0;const maxR=12+Math.floor(Math.random()*8);const iv=setInterval(()=>{cur=rInt(1,b.type==='front'?cfg.fMax:cfg.bMax);span.textContent=String(cur).padStart(2,'0');cnt++;playTick();if(cnt>=maxR){clearInterval(iv);span.textContent=String(b.num).padStart(2,'0');span.classList.remove('rolling');span.classList.add('stopped');playWin();setTimeout(()=>span.classList.remove('stopped'),500);}},60);},i*500+100);
        });
        idx++;setTimeout(showNext,allBalls.length*500+400);
    }
    showNext();
}

function renderAnalysis(){ const cfg=getCfg();const hot=Array.from({length:10},()=>rInt(1,cfg.fMax)).sort((a,b)=>a-b);const cold=Array.from({length:10},()=>rInt(1,cfg.fMax)).sort((a,b)=>a-b);document.getElementById('mainContent').innerHTML=`<div class="grid-2"><div class="panel"><div class="panel-title">🔥 热号TOP10 - ${cfg.fName}</div><div class="ball-container">${hot.map(n=>`<span class="ball front">${String(n).padStart(2,'0')}</span>`).join('')}</div></div><div class="panel"><div class="panel-title">❄️ 冷号TOP10 - ${cfg.fName}</div><div class="ball-container">${cold.map(n=>`<span class="ball front" style="opacity:0.5;">${String(n).padStart(2,'0')}</span>`).join('')}</div></div><div class="panel"><div class="panel-title">📉 遗漏分析</div><table><tr><th>号码</th><th>当前遗漏</th><th>平均遗漏</th></tr>${Array.from({length:10},(_,i)=>`<tr><td>${String(i+1).padStart(2,'0')}</td><td style="color:var(--red);">${rInt(0,30)}期</td><td>${rInt(3,15)}期</td></tr>`).join('')}</table></div><div class="panel"><div class="panel-title">📐 和值走势</div><div class="chart-box" id="chartSum"></div></div></div>`;setTimeout(()=>{const el=document.getElementById('chartSum');if(el){const c=echarts.init(el);c.setOption({xAxis:{data:['1','2','3']},yAxis:{},series:[{data:[50,80,60],type:'line'}]});}},300); }
function renderLab(){ document.getElementById('mainContent').innerHTML=`<div class="grid-2"><div class="panel"><div class="panel-title">🧪 蒙特卡洛模拟</div><button class="btn small" onclick="runMonteCarlo(1000)">1000次</button><button class="btn small" onclick="runMonteCarlo(10000)">10000次</button><div id="monteResult" class="ball-container" style="margin-top:10px;"></div></div><div class="panel"><div class="panel-title">🔗 马尔可夫链推荐</div><button class="btn small primary" onclick="runMarkov()">生成推荐号码</button><div id="markovResult" class="ball-container" style="margin-top:10px;"></div></div><div class="panel"><div class="panel-title">📐 综合评分权重</div><table>${['热号','冷号','遗漏','马尔可夫链','蒙特卡洛','贝叶斯'].map((name,i)=>{const k=['hot','cold','miss','markov','monte','bayes'][i];return`<tr><td>${name}</td><td id="w${k}">${STATE.settings.weights[k]}%</td><td><input type="range" min="0" max="40" value="${STATE.settings.weights[k]}" oninput="updateWeight('${k}',this.value)"></td></tr>`;}).join('')}</table></div></div>`; }
function runMonteCarlo(times){ const cfg=getCfg();const ff={},bf={};for(let i=1;i<=cfg.fMax;i++)ff[i]=0;for(let i=1;i<=cfg.bMax;i++)bf[i]=0;for(let i=0;i<times;i++){const n=genRandom(cfg);n.fronts.forEach(x=>ff[x]++);n.backs.forEach(x=>bf[x]++);}const fronts=Object.entries(ff).sort((a,b)=>b[1]-a[1]).slice(0,cfg.fCnt).map(([n])=>+n).sort((a,b)=>a-b);const backs=Object.entries(bf).sort((a,b)=>b[1]-a[1]).slice(0,cfg.bCnt).map(([n])=>+n).sort((a,b)=>a-b);rollNumbersSequentially('monteResult',fronts,backs,cfg); }
function runMarkov(){ const cfg=getCfg();const bm=(max)=>{const m={};for(let i=1;i<=max;i++)m[i]={};for(let i=1;i<=max;i++){let t=0;for(let j=1;j<=max;j++)if(i!==j){m[i][j]=Math.random();t+=m[i][j];}for(let j=1;j<=max;j++)if(i!==j)m[i][j]/=t;}return m;};const fm=bm(cfg.fMax),bm2=bm(cfg.bMax);const g=(mx,max,cnt)=>{const s=new Set();let c=rInt(1,max);s.add(c);while(s.size<cnt){let b=null,p=0;for(let j=1;j<=max;j++)if(!s.has(j)){const pr=mx[c]?.[j]||0;if(pr>p){p=pr;b=j;}}if(!b)do{b=rInt(1,max);}while(s.has(b));s.add(b);c=b;}return[...s].sort((a,b)=>a-b);};const fronts=g(fm,cfg.fMax,cfg.fCnt),backs=g(bm2,cfg.bMax,cfg.bCnt);rollNumbersSequentially('markovResult',fronts,backs,cfg); }

async function fetchRealResults(lotteryType){
    const apiKey=STATE.settings.apiKey;
    if(apiKey){try{const code=lotteryType==='dlt'?'dlt':'ssq';const url=`https://api.jisuapi.com/caipiao/history?appkey=${apiKey}&caipiaoid=${code}&issueno=&start=0&num=20`;const resp=await fetch(url);const data=await resp.json();if(data.status==='0'&&data.result&&data.result.list){return data.result.list.map(item=>({issue:item.issueno,date:item.opendate,fronts:item.number.split(' ').slice(0,lotteryType==='dlt'?5:6).map(Number),backs:item.number.split(' ').slice(lotteryType==='dlt'?5:6).map(Number)}));}}catch(e){}}
    return generateMockResults(lotteryType);
}
function generateMockResults(type){ const results=[];const now=new Date();for(let i=0;i<20;i++){const cfg=type==='dlt'?{fMax:35,fCnt:5,bMax:12,bCnt:2}:{fMax:33,fCnt:6,bMax:16,bCnt:1};const nums=genRandom(cfg);const date=new Date(now.getTime()-i*2*24*60*60*1000);results.push({issue:`${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(i+1).padStart(2,'0')}`,date:date.toISOString().slice(0,10),fronts:nums.fronts,backs:nums.backs});}return results; }

function renderHistory(){ const r=STATE.history.slice(0,30);document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">📋 预测历史 (最近${r.length}条)</div>${r.length?r.map(h=>`<p style="text-align:center;font-size:0.8em;">${new Date(h.timestamp).toLocaleString()} - ${h.lottery==='dlt'?'大乐透':'双色球'} - ${h.numbers.fronts.join(' ')} | ${h.numbers.backs.join(' ')} (${h.score}分 ${h.rating})</p>`).join(''):'<p>暂无记录</p>'}</div>`; }
async function renderAdmin(){ if(!isAdmin()){showToast('权限不足','#FF4D6D');return;}let html='<div class="panel"><div class="panel-title">👑 管理后台</div>';if(sb){const{data:users}=await sb.from('profiles').select('*');const{data:logs}=await sb.from('user_logs').select('*').order('created_at',{ascending:false}).limit(50);const{data:payments}=await sb.from('payments').select('*');html+=`<h3>用户列表</h3><table><tr><th>邮箱</th><th>角色</th><th>VIP</th></tr>${(users||[]).map(u=>`<tr><td>${u.email||''}</td><td>${u.role||'user'}</td><td>${u.vip?'是':'否'}</td></tr>`).join('')}</table><h3>最近日志</h3><table><tr><th>动作</th><th>详情</th><th>时间</th></tr>${(logs||[]).map(l=>`<tr><td>${l.action}</td><td>${l.details||''}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`).join('')}</table><h3>收益统计</h3><p>支付记录:${(payments||[]).length}笔 | 模拟收入:¥${((payments||[]).length*9.9).toFixed(1)}</p>`;}html+='</div>';document.getElementById('mainContent').innerHTML=html; }
function renderSettings(){ document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">⚙️ 系统设置</div><button class="btn small" onclick="STATE.settings.sound=!STATE.settings.sound;saveState();this.textContent='音效 '+(STATE.settings.sound?'开':'关');">音效 ${STATE.settings.sound?'开':'关'}</button><button class="btn small" onclick="toggleMusic()">音乐 ${STATE.settings.music?'开':'关'}</button><div style="margin-top:10px;"><input type="file" id="musicFileInput" accept="audio/*"><button class="btn small" onclick="uploadMusic()">上传音乐</button>${STATE.customMusic?'<span style="color:var(--green);margin-left:8px;">✓已自定义</span>':''}</div><div style="margin-top:10px;"><label>彩票API Key:</label><input id="apiKeyInput" value="${STATE.settings.apiKey||''}" style="width:200px;padding:5px;background:#000;color:#fff;border:1px solid var(--border);margin-left:8px;"><button class="btn small" onclick="STATE.settings.apiKey=document.getElementById('apiKeyInput').value;saveState();showToast('API Key已保存');" style="margin-left:5px;">保存</button></div><p style="margin-top:10px;">Supabase: ${SUPABASE_URL}</p></div>`; }
function uploadMusic(){ const f=document.getElementById('musicFileInput').files[0];if(!f)return;const r=new FileReader();r.onload=e=>{STATE.customMusic=e.target.result;saveState();if(bgMusic){bgMusic.src=STATE.customMusic;if(STATE.settings.music)bgMusic.play().catch(()=>{});}showToast('音乐已更新');};r.readAsDataURL(f); }
</script>
</body>
</html>
