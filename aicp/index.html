<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI彩票预测专家 Pro Max | Cyberpunk Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cyan:#00F5FF; --purple:#6E00FF; --green:#00FF9D; --red:#FF4D6D; --bg:#0B1020; --panel:rgba(10,18,40,0.85); --border:rgba(0,245,255,0.3); --glow:0 0 20px rgba(0,245,255,0.4); --text:#c8d6e5; --gold:#FFD700; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; overflow-x:hidden; min-height:100vh; user-select:none; -webkit-tap-highlight-color:transparent; }
        #particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .scanline { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.015) 2px,rgba(0,245,255,0.015) 4px); }
        #app { position:relative; z-index:10; display:flex; flex-direction:column; min-height:100vh; }
        .navbar { background:rgba(8,14,30,0.9); border-bottom:2px solid var(--border); backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; padding:8px 16px; gap:8px; box-shadow:0 4px 30px rgba(0,0,0,0.6); }
        .navbar .logo { font-size:1.3em; font-weight:900; background:linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; white-space:nowrap; }
        .navbar .nav-tabs { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
        .navbar .nav-tab { padding:7px 13px; border:1px solid rgba(0,245,255,0.35); border-radius:20px; cursor:pointer; font-size:0.78em; transition:all 0.3s; background:transparent; color:var(--text); white-space:nowrap; letter-spacing:1px; }
        .navbar .nav-tab:hover { border-color:var(--cyan); box-shadow:0 0 15px rgba(0,245,255,0.35); color:#fff; background:rgba(0,245,255,0.08); }
        .navbar .nav-tab.active { background:rgba(0,245,255,0.15); border-color:var(--cyan); color:#fff; box-shadow:var(--glow); font-weight:bold; }
        .navbar .lottery-switch { display:flex; gap:4px; background:rgba(0,0,0,0.4); border-radius:25px; padding:3px; border:1px solid var(--border); }
        .navbar .lottery-switch button { padding:7px 16px; border-radius:22px; border:none; cursor:pointer; font-weight:bold; font-size:0.8em; transition:all 0.3s; background:transparent; color:var(--text); letter-spacing:1px; }
        .navbar .lottery-switch button.active { background:var(--cyan); color:#000; box-shadow:0 0 20px rgba(0,245,255,0.6); }
        .main-content { flex:1; padding:16px; max-width:1400px; margin:0 auto; width:100%; }
        .panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; backdrop-filter:blur(10px); box-shadow:0 8px 40px rgba(0,0,0,0.5); position:relative; overflow:hidden; }
        .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0.6; }
        .panel-title { font-size:1.1em; font-weight:bold; color:var(--cyan); letter-spacing:2px; margin-bottom:14px; display:flex; align-items:center; gap:8px; text-transform:uppercase; }
        .panel-title::before { content:'◆'; font-size:0.6em; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .ball { width:52px; height:52px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:900; font-size:1.2em; color:#fff; vertical-align:middle; margin:2px; }
        .ball.front { background:radial-gradient(circle at 35% 30%,#ff6b8a,#c0392b 90%); box-shadow:0 0 25px rgba(255,77,109,0.6); }
        .ball.back { background:radial-gradient(circle at 35% 30%,#5dade2,#1a5276 90%); box-shadow:0 0 25px rgba(0,180,255,0.6); }
        .ball.rolling { animation:ballRoll 0.08s infinite; }
        @keyframes ballRoll { 0%{transform:translateY(-3px);} 50%{transform:translateY(3px);} 100%{transform:translateY(-3px);} }
        .ball.stopped { animation:ballStop 0.5s ease-out; }
        @keyframes ballStop { 0%{transform:scale(1.3);box-shadow:0 0 50px rgba(255,215,0,1);} 60%{transform:scale(0.9);} 100%{transform:scale(1);} }
        .btn { padding:10px 20px; border-radius:25px; border:1px solid var(--border); cursor:pointer; font-weight:bold; letter-spacing:1px; transition:all 0.3s; background:transparent; color:var(--text); font-family:inherit; font-size:0.85em; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .btn:hover:not(:disabled) { box-shadow:var(--glow); border-color:var(--cyan); color:#fff; transform:translateY(-2px); }
        .btn.primary { background:linear-gradient(135deg,rgba(0,245,255,0.2),rgba(110,0,255,0.2)); border-color:var(--cyan); color:#fff; }
        .btn.danger { border-color:var(--red); color:var(--red); }
        .btn.small { padding:5px 12px; font-size:0.7em; border-radius:15px; }
        .btn.vip { border-color:var(--gold); color:var(--gold); background:rgba(255,215,0,0.1); }
        .rating-badge { display:inline-block; padding:6px 16px; border-radius:20px; font-weight:900; font-size:1em; letter-spacing:2px; border:2px solid; }
        .rating-sss { border-color:#FFD700; color:#FFD700; box-shadow:0 0 30px rgba(255,215,0,0.7); animation:glowGold 1.5s infinite; }
        @keyframes glowGold { 0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.5);} 50%{box-shadow:0 0 45px rgba(255,215,0,1);} }
        .rating-ss { border-color:#ff6b9d; color:#ff6b9d; } .rating-s { border-color:#ff9f43; color:#ff9f43; }
        .rating-a { border-color:#54a0ff; color:#54a0ff; } .rating-b { border-color:#5f27cd; color:#5f27cd; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(5,8,20,0.95); display:flex; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(10px); }
        .overlay .login-title { font-size:2.8em; font-weight:900; background:linear-gradient(135deg,#FFD700,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:16px; filter:drop-shadow(0 0 20px var(--cyan)); }
        .overlay .login-box { background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:30px; width:90%; max-width:420px; }
        .overlay input { width:100%; padding:12px 16px; margin:8px 0; border-radius:25px; border:1px solid var(--border); background:rgba(0,0,0,0.4); color:#fff; font-size:0.9em; outline:none; }
        .overlay input:focus { border-color:var(--cyan); box-shadow:0 0 20px rgba(0,245,255,0.3); }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; z-index:8000; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .modal-content { background:var(--panel); border:2px solid var(--border); border-radius:20px; padding:24px; max-width:500px; width:90%; text-align:center; }
        .toast { position:fixed; top:20px; right:20px; z-index:9999; padding:12px 20px; border-radius:25px; background:var(--panel); border:1px solid var(--green); color:var(--green); font-weight:bold; animation:toastIn 0.4s ease-out; }
        @keyframes toastIn { from{opacity:0;transform:translateX(60px);} to{opacity:1;transform:translateX(0);} }
        .music-btn { position:fixed; bottom:20px; right:20px; z-index:1000; width:50px; height:50px; border-radius:50%; background:var(--panel); border:1px solid var(--border); color:var(--cyan); font-size:1.4em; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .pred-item { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.3); border-radius:12px; padding:8px 14px; }
        .ball-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
        .vip-lock { color:var(--gold); font-size:0.8em; margin-left:4px; }
        .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
        .dashboard-card { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:12px; padding:15px; text-align:center; }
        .dashboard-value { font-size:1.6em; font-weight:bold; color:var(--cyan); }
        .dashboard-label { font-size:0.7em; color:var(--text); margin-top:4px; }
        .pred-grid { display:grid; gap:12px; justify-content:center; }
        .pred-col { display:flex; flex-direction:column; gap:12px; }
        .flex-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .grid-2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
        .chart-box { width:100%; height:300px; }
        .result-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="scanline"></div>

<div id="loginOverlay" class="overlay">
    <div class="login-title">AI 预测终端</div>
    <div class="login-box">
        <input type="email" id="loginEmail" placeholder="邮箱">
        <input type="password" id="loginPass" placeholder="密码">
        <button class="btn primary" onclick="handleLogin()" style="width:100%;">登录</button>
        <p style="text-align:center;margin-top:15px;"><a href="#" onclick="showRegister()" style="color:var(--cyan);">注册新账号</a></p>
    </div>
</div>
<div id="registerOverlay" class="overlay hidden">
    <div class="login-title">注册账号</div>
    <div class="login-box">
        <input type="email" id="regEmail" placeholder="邮箱">
        <input type="password" id="regPass" placeholder="密码(6位以上)">
        <button class="btn primary" onclick="handleRegister()" style="width:100%;">注册</button>
        <p style="text-align:center;margin-top:15px;"><a href="#" onclick="showLogin()" style="color:var(--cyan);">返回登录</a></p>
    </div>
</div>

<div id="app" class="hidden">
    <nav class="navbar">
        <span class="logo">⚡ AI预测 Pro Max</span>
        <div class="lottery-switch">
            <button id="btnDLT" class="active" onclick="switchLottery('dlt')">大乐透</button>
            <button id="btnSSQ" onclick="switchLottery('ssq')">双色球</button>
        </div>
        <div class="nav-tabs" id="navTabs">
            <span class="nav-tab active" data-tab="predict">🎯 AI预测</span>
            <span class="nav-tab" data-tab="analysis">📊 分析 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="lab">🧪 实验室 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="charts">📈 图表 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="simulator">🎰 摇奖</span>
            <span class="nav-tab" data-tab="results">📡 开奖</span>
            <span class="nav-tab" data-tab="favorites">⭐ 收藏 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="history">📋 历史 <span class="vip-lock">🔒</span></span>
            <span class="nav-tab" data-tab="admin" id="adminTab" style="display:none;">👑 管理</span>
            <span class="nav-tab" data-tab="settings">⚙️ 设置</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <span id="vipBadge" style="color:var(--gold);font-weight:bold;display:none;">👑 VIP</span>
            <button class="btn small vip" onclick="showVIPModal()">升级VIP</button>
            <span id="userDisplay"></span>
            <button class="btn small danger" onclick="logout()" id="logoutBtn" style="display:none;">退出</button>
        </div>
    </nav>
    <div class="main-content" id="mainContent"></div>
    <footer style="text-align:center;padding:16px;font-size:0.7em;opacity:0.5;">AI彩票预测专家 Pro Max · 仅用于数据分析与可视化 · 不保证预测准确性</footer>
</div>
<div id="toastContainer"></div>
<div class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵</div>

<script>
// Supabase 配置
const SUPABASE_URL = 'https://qwvrojfdripeswuocgpo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_5c2rAccL-qR_QX7iAiQXiw_IdCVF_a4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATE = {
    lottery: 'dlt', currentTab: 'predict', user: null,
    favorites: [], history: [],
    settings: { sound: true, music: true, apiKey: '' },
    freeSimCount: 10, isRolling: false, customMusicUrl: null
};

// 本地存储
function loadState() {
    try {
        const raw = localStorage.getItem('lottery_state');
        if (raw) {
            const d = JSON.parse(raw);
            STATE.favorites = d.favorites || [];
            STATE.history = d.history || [];
            STATE.settings = { ...STATE.settings, ...d.settings };
            STATE.freeSimCount = d.freeSimCount ?? 10;
            STATE.customMusicUrl = d.customMusicUrl || null;
        }
    } catch(e) {}
}
function saveState() {
    localStorage.setItem('lottery_state', JSON.stringify({
        favorites: STATE.favorites,
        history: STATE.history,
        settings: STATE.settings,
        freeSimCount: STATE.freeSimCount,
        customMusicUrl: STATE.customMusicUrl
    }));
}
loadState();

// 粒子
const canvasP=document.getElementById('particleCanvas'),ctxP=canvasP.getContext('2d');
let particles=[];
function resizeC(){ canvasP.width=innerWidth; canvasP.height=innerHeight; }
resizeC(); window.addEventListener('resize',()=>{resizeC();initP();});
function initP(){ particles=[]; for(let i=0;i<70;i++) particles.push({x:Math.random()*canvasP.width,y:Math.random()*canvasP.height,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:Math.random()*2+1,alpha:Math.random()*0.5+0.3}); }
initP();
function animP(){ ctxP.clearRect(0,0,canvasP.width,canvasP.height); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvasP.width;if(p.x>canvasP.width)p.x=0;if(p.y<0)p.y=canvasP.height;if(p.y>canvasP.height)p.y=0;ctxP.beginPath();ctxP.arc(p.x,p.y,p.r,0,Math.PI*2);ctxP.fillStyle='rgba(0,245,255,'+p.alpha+')';ctxP.fill();});requestAnimationFrame(animP);}
animP();

// 音乐
let bgMusic=null;
function initMusic(){ if(!bgMusic){bgMusic=new Audio();bgMusic.loop=true;bgMusic.volume=0.2;} if(STATE.customMusicUrl)bgMusic.src=STATE.customMusicUrl;else bgMusic.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA='; if(STATE.settings.music)bgMusic.play().catch(()=>{}); }
function toggleMusic(){ STATE.settings.music=!STATE.settings.music;if(STATE.settings.music){bgMusic.play().catch(()=>{});showToast('音乐开启');}else{bgMusic.pause();showToast('音乐关闭');}document.getElementById('musicToggle').textContent=STATE.settings.music?'🎵':'🔇'; }
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playTick(){if(!STATE.settings.sound)return;try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=800+Math.random()*400;g.gain.value=0.04;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);o.stop(audioCtx.currentTime+0.08);}catch(e){}}
function playWin(){if(!STATE.settings.sound)return;try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=1100;g.gain.value=0.07;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);o.stop(audioCtx.currentTime+0.25);}catch(e){}}

function showToast(msg,color='#00FF9D'){ const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.borderColor=color;t.style.color=color;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='0.5s';setTimeout(()=>t.remove(),500);},2000); }
function getCfg(){ return STATE.lottery==='dlt'?{name:'大乐透',fMax:35,fCnt:5,bMax:12,bCnt:2}:{name:'双色球',fMax:33,fCnt:6,bMax:16,bCnt:1}; }
function rInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function genRandom(cfg){ const f=new Set();while(f.size<cfg.fCnt)f.add(rInt(1,cfg.fMax));const b=new Set();while(b.size<cfg.bCnt)b.add(rInt(1,cfg.bMax));return{fronts:[...f].sort((a,b)=>a-b),backs:[...b].sort((a,b)=>a-b)}; }
function aiPredict(){ const cfg=getCfg();const nums=genRandom(cfg);const score=Math.min(99.9,70+Math.random()*25);let r='B';if(score>=97)r='SSS';else if(score>=93)r='SS';else if(score>=88)r='S';else if(score>=80)r='A';return{numbers:nums,score:parseFloat(score.toFixed(1)),rating:r,timestamp:new Date().toISOString(),lottery:STATE.lottery}; }

function rollNumbersSequentially(containerId,fronts,backs,cfg,callback){
    const container=document.getElementById(containerId);if(!container)return;
    STATE.isRolling=true;container.innerHTML='';
    const all=[];fronts.forEach((n,i)=>all.push({num:n,type:'front',delay:i*500}));backs.forEach((n,i)=>all.push({num:n,type:'back',delay:(fronts.length+i)*500}));
    all.forEach(item=>{
        const ball=document.createElement('span');ball.className='ball rolling '+item.type;ball.textContent='?';ball.style.opacity='0.4';container.appendChild(ball);
        setTimeout(()=>{ball.style.opacity='1';let cur=rInt(1,item.type==='front'?cfg.fMax:cfg.bMax),cnt=0;const maxR=12+Math.floor(Math.random()*8);const iv=setInterval(()=>{cur=rInt(1,item.type==='front'?cfg.fMax:cfg.bMax);ball.textContent=String(cur).padStart(2,'0');cnt++;playTick();if(cnt>=maxR){clearInterval(iv);ball.textContent=String(item.num).padStart(2,'0');ball.classList.remove('rolling');ball.classList.add('stopped');playWin();setTimeout(()=>ball.classList.remove('stopped'),400);}},70);},item.delay);
    });
    setTimeout(()=>{STATE.isRolling=false;if(callback)callback();},all.length*500+800);
}

// VIP
function isVIP(){ return STATE.user?.vip; }
function isAdmin(){ return STATE.user?.role==='admin'; }
function requireVIP(act){ if(!isVIP()){showToast('🔒 '+act+'需要VIP','#FFD700');showVIPModal();return false;}return true; }
function showVIPModal(){ const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="modal-content"><h3 style="color:var(--gold);">Pro 会员</h3><p style="color:var(--cyan);">¥9.9/月</p><button class="btn primary" id="btnPay">去支付</button><button class="btn" id="btnVerify" style="display:none;" onclick="verifyPayment(this)">验证支付</button><button class="btn small" onclick="this.closest('.modal').remove()">取消</button><p id="payHint"></p></div>`;document.body.appendChild(m);document.getElementById('btnPay').addEventListener('click',()=>{showToast('模拟支付中...','#FFD700');document.getElementById('btnPay').style.display='none';document.getElementById('btnVerify').style.display='inline-block';document.getElementById('payHint').textContent='支付后点击验证';}); }
async function verifyPayment(btn){ btn.disabled=true;btn.textContent='验证中...';const{error}=await sb.from('payments').insert({user_id:STATE.user.id,amount:9.9,status:'success'});if(error){showToast('验证失败','#FF4D6D');btn.disabled=false;btn.textContent='验证支付';return;}await sb.from('profiles').update({vip:true}).eq('id',STATE.user.id);STATE.user.vip=true;updateVIPUI();document.querySelector('.modal')?.remove();showToast('VIP已激活','#FFD700'); }
function updateVIPUI(){ document.getElementById('vipBadge').style.display=isVIP()?'inline':'none';document.querySelectorAll('.vip-lock').forEach(l=>l.style.display=isVIP()?'none':'inline');document.getElementById('userDisplay').textContent=STATE.user?.email||'';document.getElementById('logoutBtn').style.display=STATE.user?'inline-block':'none';if(isAdmin())document.getElementById('adminTab').style.display='inline-block'; }

// 认证
async function handleRegister(){ const email=document.getElementById('regEmail').value.trim();const password=document.getElementById('regPass').value.trim();if(!email||password.length<6){showToast('邮箱与密码不合法','#FF4D6D');return;}const{data,error}=await sb.auth.signUp({email,password});if(error){showToast('注册失败:'+error.message,'#FF4D6D');return;}if(data.user){await sb.from('profiles').upsert({id:data.user.id,email,role:'user',vip:false},{onConflict:'id'});STATE.user={id:data.user.id,email,role:'user',vip:false};enterApp();} }
async function handleLogin(){ const email=document.getElementById('loginEmail').value.trim();const password=document.getElementById('loginPass').value.trim();if(!email||!password){showToast('请输入邮箱和密码','#FF4D6D');return;}const{data,error}=await sb.auth.signInWithPassword({email,password});if(error){showToast('登录失败:'+error.message,'#FF4D6D');return;}if(data.user){const{data:profile}=await sb.from('profiles').select('*').eq('id',data.user.id).single();STATE.user={id:data.user.id,email,role:profile?.role||'user',vip:profile?.vip||false};STATE.customMusicUrl=profile?.custom_music_url||null;enterApp();} }
async function logout(){ await sb.auth.signOut();STATE.user=null;location.reload(); }
function showRegister(){ document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('registerOverlay').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerOverlay').classList.add('hidden');document.getElementById('loginOverlay').classList.remove('hidden'); }
function enterApp(){ document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('registerOverlay').classList.add('hidden');document.getElementById('app').classList.remove('hidden');updateVIPUI();switchTab('predict');initMusic(); }
async function initSession(){ const{data:{session}}=await sb.auth.getSession();if(session?.user){const{data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();STATE.user={id:session.user.id,email:session.user.email,role:profile?.role||'user',vip:profile?.vip||false};STATE.customMusicUrl=profile?.custom_music_url||null;enterApp();} }
initSession();

// 每日次数
async function getTodayUsage(){ const today=new Date().toISOString().slice(0,10);const{data}=await sb.from('daily_usage').select('count').eq('user_id',STATE.user.id).eq('date',today).single();return data?.count||0; }
async function checkLimit(){ if(isVIP())return true;const used=await getTodayUsage();if(used>=3){showVIPModal();return false;}return true; }
async function incUsage(){ if(isVIP())return;const today=new Date().toISOString().slice(0,10);const{data:row}=await sb.from('daily_usage').select('count').eq('user_id',STATE.user.id).eq('date',today).single();if(row){await sb.from('daily_usage').update({count:row.count+1}).eq('user_id',STATE.user.id).eq('date',today);}else{await sb.from('daily_usage').insert({user_id:STATE.user.id,date:today,count:1});} }

// 导航
function switchTab(tab){ STATE.currentTab=tab;document.querySelectorAll('#navTabs .nav-tab').forEach(t=>t.classList.remove('active'));const el=document.querySelector(`#navTabs .nav-tab[data-tab="${tab}"]`);if(el)el.classList.add('active');
    switch(tab){
        case'predict':renderPredict();break;
        case'analysis':if(!requireVIP('分析中心'))return;renderAnalysis();break;
        case'lab':if(!requireVIP('实验室'))return;renderLab();break;
        case'charts':if(!requireVIP('图表中心'))return;renderCharts();break;
        case'simulator':renderSimulator();break;
        case'results':renderResults();break;
        case'favorites':if(!requireVIP('收藏中心'))return;renderFavorites();break;
        case'history':if(!requireVIP('历史轨迹'))return;renderHistory();break;
        case'admin':if(!isAdmin()){showToast('权限不足');return;}renderAdmin();break;
        case'settings':renderSettings();break;
    }
}
document.getElementById('navTabs').addEventListener('click',e=>{const tab=e.target.closest('.nav-tab');if(tab)switchTab(tab.dataset.tab);});
function switchLottery(type){ STATE.lottery=type;document.getElementById('btnDLT').classList.toggle('active',type==='dlt');document.getElementById('btnSSQ').classList.toggle('active',type==='ssq');switchTab(STATE.currentTab); }

// 预测页面
async function renderPredict(){
    const used=isVIP()?0:await getTodayUsage();const left=isVIP()?'∞':Math.max(0,3-used);
    document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">预测中心 · ${getCfg().name} (剩余 <span id="freeCount">${left}</span> 次)</div><div id="predictResult"></div><div class="flex-row" style="justify-content:center;"><button class="btn primary" id="btnPred1" onclick="doPredict(1)">1组</button><button class="btn vip-only" id="btnPred5" onclick="doPredict(5)">5组</button><button class="btn vip-only" id="btnPred10" onclick="doPredict(10)">10组</button><button class="btn" onclick="randomPick()">随机</button></div><p style="text-align:center;font-size:0.7em;color:var(--gold);">🔒 5组/10组需VIP</p></div>`;
}

async function doPredict(count){
    if (STATE.isRolling) return;
    if (count > 1 && !isVIP()) { showVIPModal(); return; }
    if (count === 1 && !isVIP()) { if (!await checkLimit()) return; await incUsage(); }
    document.querySelectorAll('#btnPred1, #btnPred5, #btnPred10').forEach(b=>b.disabled=true);
    const container=document.getElementById('predictResult');container.innerHTML='';
    const cfg=getCfg();const preds=[];for(let i=0;i<count;i++){const p=aiPredict();preds.push(p);STATE.history.unshift({...p,id:Date.now()});saveState();if(sb&&STATE.user)sb.from('predictions').insert({user_id:STATE.user.id,lottery:p.lottery,fronts:p.numbers.fronts.join(','),backs:p.numbers.backs.join(','),score:p.score,rating:p.rating}).then();}
    const cols=count===10?2:1;const grid=document.createElement('div');grid.className='pred-grid';grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    for(let c=0;c<cols;c++){const colDiv=document.createElement('div');colDiv.className='pred-col';for(let i=c*5;i<Math.min((c+1)*5,preds.length);i++){const item=document.createElement('div');item.className='pred-item';item.innerHTML=`<span style="color:var(--green);font-weight:bold;">${preds[i].score}分</span><span class="rating-badge rating-${preds[i].rating.toLowerCase()}">${preds[i].rating}</span><span class="ball-row" id="balls${i}"></span>`;colDiv.appendChild(item);}grid.appendChild(colDiv);}
    container.appendChild(grid);
    let idx=0;
    function showNext(){if(idx>=preds.length){document.querySelectorAll('#btnPred1, #btnPred5, #btnPred10').forEach(b=>b.disabled=false);getTodayUsage().then(used=>{const left=isVIP()?'∞':Math.max(0,3-used);const el=document.getElementById('freeCount');if(el)el.textContent=left;});return;}const p=preds[idx];const ballArea=document.getElementById(`balls${idx}`);[...p.numbers.fronts.map(n=>({num:n,type:'front'})),...p.numbers.backs.map(n=>({num:n,type:'back'}))].forEach((b,i)=>{const span=document.createElement('span');span.className='ball rolling '+b.type;span.textContent='?';span.style.width='38px';span.style.height='38px';span.style.fontSize='0.85em';ballArea.appendChild(span);setTimeout(()=>{span.style.opacity='1';let cur=rInt(1,b.type==='front'?cfg.fMax:cfg.bMax),cnt=0;const iv=setInterval(()=>{cur=rInt(1,b.type==='front'?cfg.fMax:cfg.bMax);span.textContent=String(cur).padStart(2,'0');cnt++;if(cnt>=10){clearInterval(iv);span.textContent=String(b.num).padStart(2,'0');span.classList.remove('rolling');span.classList.add('stopped');playWin();}},70);},i*500+100);});idx++;setTimeout(showNext,800);}
    showNext();
}
function randomPick(){ const cfg=getCfg();const nums=genRandom(cfg);const score=(70+Math.random()*20).toFixed(1);const rating=score>=85?'S':score>=75?'A':'B';document.getElementById('predictResult').innerHTML=`<div class="pred-item"><span style="color:var(--green);">${score}分</span><span class="rating-badge rating-${rating.toLowerCase()}">${rating}</span><span class="ball-row">${nums.fronts.map(n=>`<span class="ball front" style="width:38px;height:38px;font-size:0.85em;">${String(n).padStart(2,'0')}</span>`).join('')}${nums.backs.map(n=>`<span class="ball back" style="width:38px;height:38px;font-size:0.85em;">${String(n).padStart(2,'0')}</span>`).join('')}</span></div>`; }

// 分析中心（增强：动画+概率+100000次模拟）
function renderAnalysis(){
    const cfg=getCfg();
    document.getElementById('mainContent').innerHTML=`
        <div class="panel"><div class="panel-title">数据洞见 · ${cfg.name}</div>
        <div class="flex-row" style="justify-content:center;gap:20px;">
            <div><button class="btn primary" onclick="runAnalysis(10000)">1万次模拟</button></div>
            <div><button class="btn primary" onclick="runAnalysis(100000)">10万次模拟</button></div>
        </div>
        <div id="analysisResult" style="margin-top:20px;"></div>
        </div>`;
}

async function runAnalysis(times){
    const cfg=getCfg();
    const ff={},bf={};
    for(let i=1;i<=cfg.fMax;i++)ff[i]=0;
    for(let i=1;i<=cfg.bMax;i++)bf[i]=0;
    for(let i=0;i<times;i++){const n=genRandom(cfg);n.fronts.forEach(x=>ff[x]++);n.backs.forEach(x=>bf[x]++);}
    const totalFronts=times*cfg.fCnt,totalBacks=times*cfg.bCnt;
    const container=document.getElementById('analysisResult');
    container.innerHTML='<div style="color:var(--cyan);">分析中...</div>';
    setTimeout(()=>{
        const hotFronts=Object.entries(ff).sort((a,b)=>b[1]-a[1]).slice(0,10);
        const coldFronts=Object.entries(ff).sort((a,b)=>a[1]-b[1]).slice(0,10);
        const hotBacks=Object.entries(bf).sort((a,b)=>b[1]-a[1]).slice(0,5);
        const hotHTML=hotFronts.map(([n,c])=>`<span class="ball front rolling" data-num="${n}">${String(n).padStart(2,'0')}</span><span style="color:var(--green);font-size:0.7em;">${(c/totalFronts*100).toFixed(2)}%</span>`).join(' ');
        const coldHTML=coldFronts.map(([n,c])=>`<span class="ball front rolling" data-num="${n}">${String(n).padStart(2,'0')}</span><span style="color:var(--green);font-size:0.7em;">${(c/totalFronts*100).toFixed(2)}%</span>`).join(' ');
        const backHTML=hotBacks.map(([n,c])=>`<span class="ball back rolling" data-num="${n}">${String(n).padStart(2,'0')}</span><span style="color:var(--green);font-size:0.7em;">${(c/totalBacks*100).toFixed(2)}%</span>`).join(' ');
        container.innerHTML=`
            <div class="panel"><div class="panel-title">热号前区 (出现频率)</div><div class="ball-row" id="hotFronts">${hotHTML}</div></div>
            <div class="panel"><div class="panel-title">冷号前区</div><div class="ball-row" id="coldFronts">${coldHTML}</div></div>
            <div class="panel"><div class="panel-title">热号后区</div><div class="ball-row" id="hotBacks">${backHTML}</div></div>
        `;
        // 触发定格动画
        animateBallsInContainer('hotFronts',cfg);
        animateBallsInContainer('coldFronts',cfg);
        animateBallsInContainer('hotBacks',cfg);
    },100);
}

function animateBallsInContainer(containerId,cfg){
    const container=document.getElementById(containerId);
    if(!container)return;
    const balls=container.querySelectorAll('.ball');
    balls.forEach(ball=>{
        const num=ball.getAttribute('data-num');
        if(!num)return;
        ball.classList.add('rolling');
        let cur=rInt(1,ball.classList.contains('front')?cfg.fMax:cfg.bMax),cnt=0;
        const iv=setInterval(()=>{
            cur=rInt(1,ball.classList.contains('front')?cfg.fMax:cfg.bMax);
            ball.textContent=String(cur).padStart(2,'0');cnt++;
            if(cnt>=12){clearInterval(iv);ball.textContent=String(num).padStart(2,'0');ball.classList.remove('rolling');ball.classList.add('stopped');setTimeout(()=>ball.classList.remove('stopped'),500);}
        },70);
    });
}

// 实验室
function renderLab(){ document.getElementById('mainContent').innerHTML=`<div class="grid-2"><div class="panel"><div class="panel-title">蒙特卡洛</div><button class="btn" onclick="runMonteCarlo(1000)">1000次</button><div id="monteResult"></div></div><div class="panel"><div class="panel-title">马尔可夫</div><button class="btn" onclick="runMarkov()">5组推荐</button><div id="markovResult"></div></div></div>`; }
function runMonteCarlo(times){ const cfg=getCfg();const ff={},bf={};for(let i=1;i<=cfg.fMax;i++)ff[i]=0;for(let i=1;i<=cfg.bMax;i++)bf[i]=0;for(let i=0;i<times;i++){const n=genRandom(cfg);n.fronts.forEach(x=>ff[x]++);n.backs.forEach(x=>bf[x]++);}const sf=Object.entries(ff).sort((a,b)=>b[1]-a[1]).map(([n])=>+n),sb2=Object.entries(bf).sort((a,b)=>b[1]-a[1]).map(([n])=>+n);const groups=[];for(let i=0;i<5;i++){const fs=sf.slice(i*cfg.fCnt,i*cfg.fCnt+cfg.fCnt).sort((a,b)=>a-b);const bs=sb2.slice(i*cfg.bCnt,i*cfg.bCnt+cfg.bCnt).sort((a,b)=>a-b);if(fs.length===cfg.fCnt&&bs.length===cfg.bCnt)groups.push({fronts:fs,backs:bs});}const c=document.getElementById('monteResult');if(c)c.innerHTML=groups.map((g,i)=>`<div class="result-row"><span>组${i+1}</span> ${g.fronts.map(n=>`<span class="ball front" style="width:36px;height:36px;font-size:0.8em;">${String(n).padStart(2,'0')}</span>`).join('')} + ${g.backs.map(n=>`<span class="ball back" style="width:36px;height:36px;font-size:0.8em;">${String(n).padStart(2,'0')}</span>`).join('')}</div>`).join(''); }
function runMarkov(){ const cfg=getCfg();const bm=(max)=>{const m={};for(let i=1;i<=max;i++)m[i]={};for(let i=1;i<=max;i++){let t=0;for(let j=1;j<=max;j++)if(i!==j){m[i][j]=Math.random();t+=m[i][j];}for(let j=1;j<=max;j++)if(i!==j)m[i][j]/=t;}return m;};const fm=bm(cfg.fMax),bm2=bm(cfg.bMax);const g=(mx,max,cnt)=>{const s=new Set();let c=rInt(1,max);s.add(c);while(s.size<cnt){let b=null,p=0;for(let j=1;j<=max;j++)if(!s.has(j)){const pr=mx[c]?.[j]||0;if(pr>p){p=pr;b=j;}}if(!b)do{b=rInt(1,max);}while(s.has(b));s.add(b);c=b;}return[...s].sort((a,b)=>a-b);};const groups=[];for(let i=0;i<5;i++){groups.push({fronts:g(fm,cfg.fMax,cfg.fCnt),backs:g(bm2,cfg.bMax,cfg.bCnt)});}const c=document.getElementById('markovResult');if(c)c.innerHTML=groups.map((g,i)=>`<div class="result-row"><span>组${i+1}</span> ${g.fronts.map(n=>`<span class="ball front" style="width:36px;height:36px;font-size:0.8em;">${String(n).padStart(2,'0')}</span>`).join('')} + ${g.backs.map(n=>`<span class="ball back" style="width:36px;height:36px;font-size:0.8em;">${String(n).padStart(2,'0')}</span>`).join('')}</div>`).join(''); }
function renderCharts(){ document.getElementById('mainContent').innerHTML='<div class="panel"><div class="chart-box" id="mainChart"></div></div>';setTimeout(()=>{const el=document.getElementById('mainChart');if(el){const c=echarts.init(el);c.setOption({xAxis:{data:['A','B']},yAxis:{},series:[{data:[1,2],type:'line'}]});}},300); }
function renderSimulator(){ const left=isVIP()?'∞':STATE.freeSimCount;document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">摇奖模拟 · ${getCfg().name}</div><div id="simBalls" class="ball-row" style="justify-content:center;"></div><button class="btn primary" onclick="startSim()">开始</button></div>`; }
function startSim(){ if(!isVIP()&&STATE.freeSimCount<=0){showVIPModal();return;}if(!isVIP())STATE.freeSimCount--;saveState();const cfg=getCfg();rollNumbersSequentially('simBalls',genRandom(cfg).fronts,genRandom(cfg).backs,cfg); }

// 开奖大厅（横向排列+API实时）
async function renderResults(){
    const cfg=getCfg();
    document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">开奖大厅 · ${cfg.name} (近20期)</div><div class="flex-row" style="gap:10px;"><button class="btn small" onclick="switchLottery('dlt');renderResults();">大乐透</button><button class="btn small" onclick="switchLottery('ssq');renderResults();">双色球</button></div><div id="liveResult" style="margin-top:10px;"></div></div>`;
    const data=await fetchRealResults(STATE.lottery);
    const container=document.getElementById('liveResult');
    if(container) container.innerHTML=data.map(r=>`<div class="ball-row" style="margin:4px 0;font-size:0.8em;"><span style="min-width:80px;">${r.issue}</span> ${r.fronts.map(n=>`<span class="ball front" style="width:28px;height:28px;font-size:0.7em;">${String(n).padStart(2,'0')}</span>`).join('')} <span style="margin:0 4px;">+</span> ${r.backs.map(n=>`<span class="ball back" style="width:28px;height:28px;font-size:0.7em;">${String(n).padStart(2,'0')}</span>`).join('')}</div>`).join('');
}
async function fetchRealResults(type){
    const apiKey=STATE.settings.apiKey;
    if(apiKey){
        try{
            const code=type==='dlt'?'dlt':'ssq';
            const resp=await fetch(`https://api.jisuapi.com/caipiao/history?appkey=${apiKey}&caipiaoid=${code}&start=0&num=20`);
            const data=await resp.json();
            if(data.status==='0'&&data.result) return data.result.list.map(item=>({issue:item.issueno,date:item.opendate,fronts:item.number.split(' ').slice(0,type==='dlt'?5:6).map(Number),backs:item.number.split(' ').slice(type==='dlt'?5:6).map(Number)}));
        }catch(e){}
    }
    const results=[];const now=new Date();
    for(let i=0;i<20;i++){const cfg=getCfg();const nums=genRandom(cfg);const date=new Date(now.getTime()-i*2*86400000);results.push({issue:`${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(i+1).padStart(2,'0')}`,date:date.toISOString().slice(0,10),fronts:nums.fronts,backs:nums.backs});}
    return results;
}
// 收藏
function renderFavorites(){ const fl=STATE.favorites.filter(f=>f.lottery===STATE.lottery);document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">收藏库 · ${getCfg().name} (${fl.length}条)</div>${fl.length?fl.map((f,i)=>`<div class="result-row"><span>${f.numsStr.replace('|',' | ')} 评分:${f.score}</span><button class="btn small danger" onclick="removeFavorite(${i})">删除</button></div>`).join(''):'暂无收藏'}</div>`; }
function saveFavorite(numsStr,score,rating){ if(!requireVIP('收藏功能'))return;const exists=STATE.favorites.find(f=>f.numsStr===numsStr&&f.lottery===STATE.lottery);if(exists){showToast('已收藏');return;}STATE.favorites.push({numsStr,score,rating,lottery:STATE.lottery,time:new Date().toISOString()});saveState();showToast('已收藏'); }
function removeFavorite(index){ const fl=STATE.favorites.filter(f=>f.lottery===STATE.lottery);const actual=STATE.favorites.findIndex(f=>f===fl[index]);if(actual>=0){STATE.favorites.splice(actual,1);saveState();renderFavorites();} }
// 历史
function renderHistory(){ const recent=STATE.history.slice(0,30);document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">历史轨迹</div>${recent.length?recent.map(h=>`<div>${new Date(h.timestamp).toLocaleString()} - ${h.numbers.fronts.join(' ')} | ${h.numbers.backs.join(' ')} (${h.score}分)</div>`).join(''):'暂无记录'}</div>`; }
function renderAdmin(){ document.getElementById('mainContent').innerHTML='<div class="panel"><div class="panel-title">管理后台</div></div>'; }
// 设置（增加API Key输入）
function renderSettings(){
    document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">系统设置</div><button class="btn" onclick="STATE.settings.sound=!STATE.settings.sound;this.textContent='音效 '+(STATE.settings.sound?'开':'关');">音效 ${STATE.settings.sound?'开':'关'}</button><button class="btn" onclick="toggleMusic()">音乐 ${STATE.settings.music?'开':'关'}</button><div style="margin-top:10px;"><label>彩票API Key (实时开奖)</label><input type="text" id="apiKeyInput" value="${STATE.settings.apiKey||''}" style="width:250px;padding:8px;background:#000;color:#fff;border:1px solid var(--border);margin-left:10px;"><button class="btn small" onclick="saveApiKey()">保存</button></div><div style="margin-top:10px;"><input type="file" id="musicFileInput" accept="audio/*"><button class="btn" onclick="uploadMusic()">上传音乐</button></div></div>`;
}
function saveApiKey(){ STATE.settings.apiKey=document.getElementById('apiKeyInput').value.trim();saveState();showToast('API Key已保存'); }
async function uploadMusic(){
    const file=document.getElementById('musicFileInput').files[0];if(!file)return;
    const fileName=`${STATE.user.id}_${Date.now()}.mp3`;
    const{error}=await sb.storage.from('music').upload(fileName,file);
    if(error){showToast('上传失败','#FF4D6D');return;}
    const{data:urlData}=sb.storage.from('music').getPublicUrl(fileName);
    STATE.customMusicUrl=urlData.publicUrl;
    await sb.from('profiles').update({custom_music_url:STATE.customMusicUrl}).eq('id',STATE.user.id);
    if(bgMusic){bgMusic.src=STATE.customMusicUrl;if(STATE.settings.music)bgMusic.play().catch(()=>{});}
    showToast('音乐已同步');
}
