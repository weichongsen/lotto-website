<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
  <title>AI彩票预测专家 Pro Max | 赛博朋克数据驾驶舱</title>
  <!-- 引入 ECharts -->
  <script src="https://registry.npmmirror.com/echarts/5.6.0/files/dist/echarts.min.js"></script>
  <!-- 引入 Supabase SDK -->
  <script src="https://registry.npmmirror.com/@supabase/supabase-js/2.39.0/files/dist/umd/supabase.min.js"></script>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="scan-line"></div>
  <div class="radar-ring"></div>

  <!-- 登录/注册弹窗 -->
  <div class="modal active" id="auth-modal">
    <div class="modal-content">
      <h2 class="neon-text" id="auth-title">🔐 登录</h2>
      <input type="email" id="auth-email" placeholder="邮箱">
      <input type="password" id="auth-password" placeholder="密码（至少6位）">
      <input type="text" id="auth-username" placeholder="用户名（仅注册时）" style="display:none;">
      <div id="otp-section" style="display:none; margin-top:10px;">
        <div style="display:flex; gap:8px;">
          <input type="text" id="auth-otp" placeholder="邮箱验证码" style="flex:1;">
          <button class="cyber-btn" id="send-otp-btn" onclick="window.sendOTP()">获取验证码</button>
        </div>
      </div>
      <button class="cyber-btn" id="auth-submit" onclick="window.handleAuth()" style="width:100%; margin-top:15px;">登 录</button>
      <p style="text-align:center; margin-top:15px; color:#aaa;">
        <span id="toggle-auth" onclick="window.toggleAuthMode()" style="color:#00F5FF; cursor:pointer;">还没有账号？立即注册</span>
      </p>
      <button class="cyber-btn gold" onclick="window.quickLogin()" style="width:100%; margin-top:10px;">⚡ 临时登录（管理员）</button>
    </div>
  </div>

  <!-- VIP购买弹窗 -->
  <div class="modal" id="vip-modal">
    <div class="modal-content" style="max-width:600px;">
      <h2 class="neon-text" style="text-align:center;">👑 升级VIP</h2>
      <div id="vip-plans" class="grid-2col" style="margin:15px 0;"></div>
      <div style="text-align:center;">
        <button class="cyber-btn gold" id="vip-pay-btn" onclick="window.handleVipPayment()">💰 立即支付</button>
        <p style="margin-top:8px;"><span onclick="document.getElementById('vip-modal').classList.remove('active')" style="color:#FF4D6D; cursor:pointer;">暂不升级</span></p>
      </div>
    </div>
  </div>

  <!-- 主应用 -->
  <div class="app-container" id="main-app" style="display:none;">
    <div class="navbar">
      <span class="neon-text" style="font-size:1.6rem; font-weight:800;">🤖 AI预测专家 Pro Max</span>
      <div>
        <button id="switch-dlt" class="switch-btn active">大乐透</button>
        <button id="switch-ssq" class="switch-btn">双色球</button>
      </div>
      <div class="nav-links">
        <span onclick="switchTab('prediction')">🔮预测</span>
        <span onclick="switchTab('analysis')">📊分析</span>
        <span onclick="switchTab('lab')">🧪实验室</span>
        <span onclick="switchTab('charts')">📈图表</span>
        <span onclick="switchTab('simulation')">🎱摇奖</span>
        <span onclick="switchTab('favorites')">⭐收藏</span>
        <span onclick="switchTab('history')">📜历史</span>
        <span onclick="switchTab('settings')">⚙️设置</span>
      </div>
      <div class="user-info">
        <span id="user-badge"></span>
        <span style="color:#fff;" id="user-name-display"></span>
        <button class="cyber-btn danger" onclick="window.handleLogout()">退出</button>
      </div>
    </div>

    <!-- 预测 -->
    <div id="tab-prediction" class="tab-content active">
      <div class="glass-panel">
        <h2 class="neon-text">🔮 AI预测结果中心 (滚动定格动画)</h2>
        <div id="prediction-display" style="min-height:80px; margin:15px 0;"></div>
        <div>
          <button class="cyber-btn" onclick="window.predict(1)">🤖 预测1组 (免费)</button>
          <button class="cyber-btn gold" onclick="window.predict(5)">⚡ 预测5组 (VIP)</button>
          <button class="cyber-btn gold" onclick="window.predict(10)">🔥 预测10组 (VIP)</button>
          <button class="cyber-btn" onclick="window.randomPredict()">🎲 随机选号</button>
          <button class="cyber-btn" onclick="window.saveFavorite()">⭐ 收藏当前</button>
          <button class="cyber-btn" id="export-current">📤 导出号码</button>
        </div>
        <div style="margin-top:12px;">
          评分: <span id="ai-score">96.8</span> | 可信度: <span id="ai-trust">98.5%</span> | 评级: <span id="ai-rating" style="color:gold;font-size:1.5rem;">SSS</span>
          <span id="predict-remaining" style="margin-left:20px; color:#6E00FF;"></span>
        </div>
      </div>
      <div class="glass-panel">
        <h3 class="neon-text">🎰 蒙特卡洛模拟 <small>(VIP)</small></h3>
        <div id="monte-carlo-balls" style="min-height:50px;"></div>
        <button class="cyber-btn gold" onclick="window.runMonteCarlo()">▶ 运行模拟 (1000次)</button>
        <span>概率: <span id="monte-score">96.8%</span></span>
      </div>
    </div>

    <!-- 分析 -->
    <div id="tab-analysis" class="tab-content">
      <div class="grid-2col">
        <div class="glass-panel"><h4>🔥热号TOP6</h4><div id="hot-display"></div></div>
        <div class="glass-panel"><h4>❄️冷号TOP6</h4><div id="cold-display"></div></div>
      </div>
      <div class="glass-panel">
        <h4>📋 导入真实开奖数据</h4>
        <textarea id="history-input" rows="3" placeholder="每行一期：大乐透: 01 02 03 04 05 06 07"></textarea>
        <button class="cyber-btn" id="import-data">📥 导入分析</button>
      </div>
    </div>

    <!-- 实验室 -->
    <div id="tab-lab" class="tab-content">
      <div class="glass-panel">
        <h3>🧪 AI策略模式</h3>
        <select id="strategy-select">
          <option value="balanced">平衡模式</option>
          <option value="conservative">稳健模式</option>
          <option value="aggressive">激进模式</option>
          <option value="extreme">极限模式</option>
        </select>
        <button class="cyber-btn" id="apply-strategy">应用策略</button>
      </div>
    </div>

    <!-- 图表 -->
    <div id="tab-charts" class="tab-content">
      <div class="glass-panel">
        <h3>📈 热号趋势图</h3>
        <div id="chart-hot" style="height:250px;"></div>
      </div>
    </div>

    <!-- 摇奖模拟 -->
    <div id="tab-simulation" class="tab-content">
      <div class="glass-panel">
        <h3>🎱 摇奖模拟中心 <span id="draw-remaining" style="font-size:0.8rem; color:#6E00FF;"></span></h3>
        <div id="draw-balls" style="min-height:60px;"></div>
        <button class="cyber-btn" onclick="window.simulateDraw()">🌀 开始摇奖</button>
      </div>
    </div>

    <!-- 收藏 -->
    <div id="tab-favorites" class="tab-content">
      <div class="glass-panel">
        <h3>⭐ 收藏中心</h3>
        <div id="favorites-list"></div>
        <button class="cyber-btn" onclick="window.exportFavorites()">📤 导出收藏</button>
        <button class="cyber-btn danger" onclick="window.clearFavorites()">🗑️ 清空收藏</button>
      </div>
    </div>

    <!-- 历史 -->
    <div id="tab-history" class="tab-content">
      <div class="glass-panel">
        <h3>📜 预测历史</h3>
        <div id="history-list"></div>
        <button class="cyber-btn" onclick="window.exportHistory()">📤 导出历史</button>
        <button class="cyber-btn danger" onclick="window.clearHistory()">🗑️ 清空历史</button>
      </div>
    </div>

    <!-- 设置 -->
    <div id="tab-settings" class="tab-content">
      <div class="glass-panel">
        <h3>⚙️ 系统设置</h3>
        <div class="grid-2col">
          <div>
            <label>主题</label>
            <select id="theme-select">
              <option value="cyber-blue">科技蓝</option>
              <option value="cyber-punk">赛博朋克</option>
              <option value="ai-purple">AI紫</option>
              <option value="deep-black">深空黑</option>
            </select>
          </div>
          <div>
            <label>动画</label>
            <select id="animation-toggle">
              <option value="on">开启</option>
              <option value="off">关闭</option>
            </select>
          </div>
          <div>
            <label>音效</label>
            <select id="sound-toggle">
              <option value="on">开启</option>
              <option value="off">关闭</option>
            </select>
          </div>
        </div>
        <div style="margin-top:15px;">
          <label>🎵 背景音乐导入</label>
          <input type="file" id="bgm-file" accept="audio/*">
          <button class="cyber-btn" id="play-bgm">▶ 播放</button>
          <button class="cyber-btn" id="stop-bgm">⏹ 停止</button>
        </div>
        <div style="margin-top:15px;">
          <button class="cyber-btn" id="export-all-json">📤 导出JSON</button>
          <button class="cyber-btn" id="export-all-excel">📤 导出Excel</button>
          <button class="cyber-btn danger" id="reset-system">⚠️ 重置系统</button>
        </div>
      </div>
    </div>

    <footer>⚠️ 本系统仅用于历史数据统计分析与可视化展示，不预测未来开奖结果。</footer>
  </div>

  <!-- 引入主逻辑 -->
  <script src="script.js"></script>
</body>
</html>
