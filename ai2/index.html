<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI控制中心 | 彩票预测专家 Pro Max</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="ray-bg"></div>
  <div class="mouse-glow" id="mouseGlow"></div>

  <!-- 顶部导航栏 -->
  <nav class="glass-panel" style="display:flex; justify-content:space-between; align-items:center; margin:10px; flex-wrap:wrap;">
    <div style="font-size:1.5rem; color:var(--blue); font-weight:900; letter-spacing:2px;">🤖 AI控制中心</div>
    <div>
      <button class="btn-holo" id="switchDlt">大乐透</button>
      <button class="btn-holo" id="switchSsq">双色球</button>
      <span id="vipBadge" style="color:var(--gold); margin-left:15px; display:none;">⭐ VIP</span>
    </div>
  </nav>

  <div class="main-layout">
    <!-- AI预测面板 -->
    <div class="glass-panel hud-scan" id="predictPanel">
      <h2 style="color:var(--blue);">🧠 AI预测中心</h2>
      <div id="predictionNumbers" style="min-height:60px; margin:10px 0;"></div>
      <div>
        <button class="btn-holo" id="predict1">🎯 预测1组</button>
        <button class="btn-holo" id="predict5">🎯 预测5组</button>
        <button class="btn-holo" id="predict10">🎯 预测10组</button>
        <button class="btn-holo" id="randomBtn">🎲 随机选号</button>
        <button class="btn-holo" id="saveFavorite">💾 收藏</button>
      </div>
    </div>

    <!-- AI评分趋势 -->
    <div class="glass-panel">
      <div id="scoreChart" style="height:250px;"></div>
    </div>

    <!-- 热号趋势 -->
    <div class="glass-panel">
      <div id="hotChart" style="height:250px;"></div>
    </div>

    <!-- 奇偶比例 -->
    <div class="glass-panel">
      <div id="oddEvenChart" style="height:250px;"></div>
    </div>

    <!-- 和值走势 -->
    <div class="glass-panel">
      <div id="sumChart" style="height:250px;"></div>
    </div>

    <!-- 摇奖模拟 -->
    <div class="glass-panel" style="grid-column: span 2;">
      <h2 style="color:var(--blue);">🎰 摇奖模拟中心</h2>
      <div id="lotteryBalls" style="min-height:60px; padding:15px 0;"></div>
      <button class="btn-holo" id="startDraw">▶ 开始摇奖</button>
    </div>

    <!-- 高级分析区 -->
    <div class="glass-panel">
      <h2 style="color:var(--blue);">🔬 高级AI实验室</h2>
      <button class="btn-holo" id="monteCarloBtn">蒙特卡洛模拟 (1000次)</button>
    </div>

    <!-- 管理员面板（仅管理员可见） -->
    <div id="adminPanel" class="glass-panel" style="display:none;">
      <h2 style="color:var(--red);">🛡️ 管理员控制台</h2>
      <button class="btn-holo" id="importDrawBtn">📥 导入开奖数据</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/lottery.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
